[package]
name = "adapters-grpc"
version = "0.1.0"
edition.workspace = true
publish.workspace = true

[lib]
name = "adapters_grpc"
path = "src/lib.rs"

[dependencies]
tonic = { version = "0.14.2", features = ["transport"] }
tonic-prost = "0.14.2"
prost = "0.14.1"
prost-types = "0.14.1"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "sync", "time"] }
model = { path = "../model" }
business-core = { path = "../business-core" }
tracing = { workspace = true }
uuid = "1.18.1"

[build-dependencies]
tonic-build = "0.14.2"
tonic-prost-build = "0.14.2"

[dev-dependencies]
async-trait = "0.1.89"

[features]
default = []
integration-grpc = []
