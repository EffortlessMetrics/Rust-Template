[package]
name = "adapters-grpc"
version = "0.1.0"
edition.workspace = true

[lib]
name = "adapters_grpc"
path = "src/lib.rs"

[dependencies]
tonic = { version = "0.14.2", features = ["transport"] }
prost = "0.14.1"
prost-types = "0.14.1"
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread", "sync"] }
model = { path = "../model" }
business-core = { path = "../business-core" }
tracing = "0.1.41"

[build-dependencies]
tonic-build = "0.14.2"
tonic-prost-build = "0.14.2"

[features]
default = []
integration-grpc = []
