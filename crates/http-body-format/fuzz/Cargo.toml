[package]
name = "http-body-format-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
libfuzzer-sys = "0.4"

[dependencies.http-body-format]
path = ".."

[[bin]]
name = "body_format_classifier"
path = "fuzz_targets/body_format_classifier.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
