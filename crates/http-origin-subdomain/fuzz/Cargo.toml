[package]
name = "http-origin-subdomain-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
libfuzzer-sys = "0.4"

[dependencies.http-origin-subdomain]
path = ".."

[[bin]]
name = "origin_subdomain_matcher"
path = "fuzz_targets/origin_subdomain_matcher.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
