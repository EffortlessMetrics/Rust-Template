[package]
name = "adapters-db-sqlx"
version = "0.1.0"
edition.workspace = true

[dependencies]
anyhow = { workspace = true }
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "time"] }
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "postgres", "migrate", "uuid", "chrono"] }
tracing = { workspace = true }
uuid = { version = "1.18.1", features = ["v4", "serde"] }
chrono = { version = "0.4.42", features = ["serde"] }
async-trait = "0.1.89"
model = { path = "../model" }
business-core = { path = "../business-core" }

[dev-dependencies]
testcontainers = "0.25.2"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros", "time"] }
async-trait = "0.1.89"
uuid = { version = "1.18.1", features = ["v4"] }
chrono = "0.4.42"

[features]
integration-db = []
