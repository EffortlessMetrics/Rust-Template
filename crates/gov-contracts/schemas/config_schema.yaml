schema_version: 1

envs:
  - name: dev
    required: false
  - name: staging
    required: true
  - name: prod
    required: true

settings:
  - key: http.port
    type: int
    default: 8080
    description: "HTTP listen port"
  - key: telemetry.otlp_endpoint
    type: string
    description: "OTLP collector URL"
    required: false
  - key: platform.auth_mode
    type: string
    description: "Authentication mode for platform endpoints (open|basic)"
    default: "open"
    required: false
  - key: platform.redact_secrets
    type: bool
    description: "Whether to redact secrets from status/UI output"
    default: true
    required: false

secrets:
  - key: db.url
    type: string
    description: "Postgres connection string"
    required: true
  - key: auth.jwt_signing_key
    type: string
    required: true
  - key: platform.auth_token
    type: string
    description: "Shared secret for platform basic auth mode"
    required: false
