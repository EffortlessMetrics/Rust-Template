[package]
name = "http-auth-verifier-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
libfuzzer-sys = "0.4"

[dependencies.http-auth-verifier]
path = ".."

[[bin]]
name = "auth_verifier"
path = "fuzz_targets/auth_verifier.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
