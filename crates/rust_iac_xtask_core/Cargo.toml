[package]
name = "rust_iac_xtask_core"
version = "0.1.0"
authors = ["Steven Zimmerman <git@effortlesssteven.com>"]
edition = "2021"
license = "Apache-2.0 OR MIT"
description = "Governance & xtask orchestration core for Rust IaC projects with spec-as-code and policy validation"
repository = "https://github.com/EffortlessMetrics/Rust-Template"
homepage = "https://github.com/EffortlessMetrics/Rust-Template"
readme = "README.md"
keywords = ["xtask", "governance", "devops", "policy", "spec-as-code"]
categories = ["development-tools", "development-tools::build-utils"]

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.51", features = ["derive"] }
colored = "3.0.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_yaml = { workspace = true }
toml = "0.8.19"
walkdir = "2.5.0"

[dev-dependencies]
tempfile = "3.23.0"
