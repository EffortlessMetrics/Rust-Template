[package]
name = "acceptance"
version = "0.1.0"
edition = "2021"
[[test]]
name="acceptance"
path="tests/acceptance.rs"
harness=false
[dependencies]
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
cucumber = { version = "0.21", features=["output-junit"] }
tokio = { version = "1", features=["rt-multi-thread","macros"] }
