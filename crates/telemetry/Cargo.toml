[dependencies]
# Optional OTLP dependencies (enabled via 'otlp' feature)
opentelemetry = {optional = true, workspace = true}
opentelemetry-otlp = {optional = true, workspace = true}
opentelemetry_sdk = {optional = true, workspace = true}
tracing-opentelemetry = {optional = true, workspace = true}
tracing.workspace = true
tracing-subscriber.workspace = true

[features]
default = []
otlp = [
  "dep:opentelemetry",
  "dep:opentelemetry-otlp",
  "dep:opentelemetry_sdk",
  "dep:tracing-opentelemetry",
  "opentelemetry-otlp/grpc-tonic"
]

[lib]
name = "telemetry"

[package]
categories = ["development-tools::debugging"]
description = "Optional OpenTelemetry tracing and metrics configuration"
documentation = "https://docs.rs/rust-as-spec-telemetry"
include = ["Cargo.toml", "LICENSE-APACHE", "LICENSE-MIT", "README.md", "src/**/*"]
keywords = ["observability", "opentelemetry", "telemetry", "tracing"]
name = "rust-as-spec-telemetry"
publish = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true
