[dependencies]
# Optional OTLP dependencies (enabled via 'otlp' feature)
opentelemetry = { optional = true, workspace = true }
opentelemetry-otlp = { optional = true, workspace = true }
opentelemetry_sdk = { optional = true, workspace = true }
tracing-opentelemetry = { optional = true, workspace = true }
tracing.workspace = true
tracing-subscriber.workspace = true

[lib]
name = "telemetry"

[features]
default = []
otlp = [
  "dep:opentelemetry",
  "dep:opentelemetry-otlp",
  "dep:opentelemetry_sdk",
  "dep:tracing-opentelemetry",
  "opentelemetry-otlp/grpc-tonic"
]

[package]
name = "rust-as-spec-telemetry"
description = "Optional OpenTelemetry tracing and metrics configuration"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
rust-version.workspace = true
documentation = "https://docs.rs/rust-as-spec-telemetry"
categories = ["development-tools::debugging"]
keywords = ["opentelemetry", "telemetry", "tracing", "observability"]
include = ["src/**/*", "README.md", "LICENSE-APACHE", "LICENSE-MIT", "Cargo.toml"]
