[package]
name = "app-http"
version = "0.1.0"
edition.workspace = true
publish.workspace = true

[dependencies]
# Workspace dependencies
anyhow.workspace = true
serde.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

# Internal crates
business-core = { path = "../business-core" }
model = { path = "../model" }
telemetry = { path = "../telemetry" }
spec-runtime = { path = "../spec-runtime" }
adapters-spec-fs = { path = "../adapters-spec-fs" }

# Web framework
axum = "0.8.7"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "net", "macros"] }
tower = "0.5.2"
tower-http = { version = "0.6.6", features = ["metrics", "trace"] }

# JSON and UUID
serde_json = "1.0.145"
serde_urlencoded = "0.7.1"
serde_yaml = { workspace = true }
uuid = { version = "1.18.1", features = ["v4"] }
chrono = "0.4.42"

# Metrics
prometheus.workspace = true
once_cell = "1.21.3"

# HTML templates
maud = "0.27.0"

# HTTP body utilities
http-body-util = "0.1.3"

[dev-dependencies]
tokio = { version = "1.48.0", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5.2", features = ["util"] }
tempfile = "3.23.0"
