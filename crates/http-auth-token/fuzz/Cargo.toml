[package]
name = "http-auth-token-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = {version = "1", features = ["derive"]}
http = "1.4.0"
libfuzzer-sys = "0.4"

[dependencies.http-auth-token]
path = ".."

[[bin]]
name = "extract_token"
path = "fuzz_targets/extract_token.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
