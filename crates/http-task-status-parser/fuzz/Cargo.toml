[package]
name = "http-task-status-parser-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = {version = "1", features = ["derive"]}
libfuzzer-sys = "0.4"

[dependencies.http-task-status-parser]
path = ".."

[[bin]]
name = "request_parser"
path = "fuzz_targets/request_parser.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
