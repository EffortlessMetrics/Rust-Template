[package]
name = "rust_iac_config"
version = "0.1.0"
authors = ["Steven Zimmerman <git@effortlesssteven.com>"]
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish.workspace = true
description = "YAML-based infrastructure configuration library for Rust IaC projects with validation rules"
repository = "https://github.com/EffortlessMetrics/Rust-Template"
homepage = "https://github.com/EffortlessMetrics/Rust-Template"
readme = "README.md"
keywords = ["iac", "config", "yaml", "validation", "infrastructure"]
categories = ["config", "development-tools"]

[lib]
doctest = false

[dependencies]
serde = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
tempfile = "3.23.0"
