[package]
name = "http-origin-boundary-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
libfuzzer-sys = "0.4"

[dependencies.http-origin-boundary]
path = ".."

[[bin]]
name = "origin_boundary"
path = "fuzz_targets/origin_boundary.rs"
test = false
doc = false
bench = false

[workspace]
members = ["."]
