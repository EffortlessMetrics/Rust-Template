[package]
name = "http-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
publish = false

[dependencies]
# HTTP framework
axum.workspace = true
http.workspace = true
http-errors = { path = "../http-errors", features = ["axum", "uuid"] }
# Platform contract types
platform-contract = { path = "../platform-contract" }
# Core business logic
business-core = { path = "../business-core" }
gov-model = { path = "../gov-model" }
spec-runtime = { path = "../spec-runtime" }
# Metrics
prometheus.workspace = true
# Utilities
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["net", "signal"] }
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
serde_json.workspace = true
testing = { path = "../testing" }
tokio.workspace = true
tower.workspace = true
