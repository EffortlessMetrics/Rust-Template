apiVersion: v1
kind: Service
metadata:
  name: app-http
  namespace: app-http-prod
  labels:
    app: app-http
    version: v1
    component: api
    app.kubernetes.io/environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: app-http
    version: v1
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
