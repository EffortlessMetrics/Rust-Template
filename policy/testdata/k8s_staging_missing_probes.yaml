apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service
  labels:
    app: my-service
    version: v1.0.0
    component: api
    app.kubernetes.io/environment: staging
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2  # Staging requires >= 2
  selector:
    matchLabels:
      app: my-service
  template:
    metadata:
      labels:
        app: my-service
        app.kubernetes.io/environment: staging
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: app
          image: my-service:staging-latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Missing probes! Staging should have liveness and readiness probes
          # This should FAIL policy validation
