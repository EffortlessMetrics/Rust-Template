apiVersion: v1
kind: Service
metadata:
  name: app-http
  namespace: app-http-prod
  labels:
    app: app-http
    version: v1
    component: api
    app.kubernetes.io/environment: production
  # Missing prometheus.io annotations!
spec:
  type: ClusterIP
  selector:
    app: app-http
    version: v1
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
