apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-no-labels
  labels:
    # Missing required labels: app, version, component
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: test-app
        image: test-app:latest
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
