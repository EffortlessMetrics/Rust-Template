# Non-Rust Configuration Allowlist
#
# This allowlist registers non-Rust files (config, CI, docs) that require
# explicit governance records. Each entry declares ownership, surface impact,
# and validation mechanism.

[[allow]]
path = "codecov.yml"
kind = "ci_coverage_policy"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "Codecov status and reporting configuration for cargo-llvm-cov coverage uploads."
covered_by = ["cargo xtask check-file-policy"]

[[allow]]
path = ".github/workflows/coverage.yml"
kind = "ci_declarative"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "GitHub Actions coverage workflow for cargo-llvm-cov and Codecov uploads."
covered_by = ["cargo xtask check-file-policy", "docs/ci/coverage.md"]

[[allow]]
glob = "badges/*.json"
kind = "generated_badge_endpoint"
owner = "release/ci"
surface = "docs"
classification = "generated"
reason = "Generated Shields endpoint JSON for public README badges."
generated_by = "cargo xtask badges"
covered_by = ["cargo xtask badges --check"]

[[allow]]
path = ".github/workflows/badge-endpoints.yml"
kind = "ci_declarative"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "Refreshes generated Shields endpoint JSON by opening an automation PR instead of pushing directly."
covered_by = ["cargo xtask badges --check"]

[[allow]]
path = ".github/workflows/ripr-pr.yml"
kind = "ci_declarative"
owner = "release/ci"
surface = "ci"
classification = "config"
reason = "Produces diff-scoped RIPR PR evidence, review guidance, annotations, and artifacts."
covered_by = ["cargo xtask ripr-pr --check", "cargo xtask ripr-review-comments --check"]

[[allow]]
path = "scripts/ripr-annotations.py"
kind = "ci_helper"
owner = "release/ci"
surface = "ci"
classification = "script"
reason = "Converts RIPR line-placeable review guidance into non-blocking GitHub Actions warning annotations."
covered_by = ["python scripts/ripr-annotations.py"]
