schema_version = "0.3"

# Global deny by default. Add narrow semantic receipts only when a panic-family
# site is reviewed debt. Identity is path + family + selector; last_seen is
# advisory and may drift during refactors.
#
# [[allow]]
# path = "crates/example/src/parser.rs"
# family = "unwrap"
# classification = "test_only"
# owner = "parser"
# explanation = "Fixture setup path; migrate to Result-returning helper."
# expires = "2026-07-01"
#
# [allow.selector]
# kind = "method_call"
# container = "parses_fixture_with_boundary_case"
# callee = "unwrap"
# receiver_fingerprint = "std::fs::read_to_string(path)"
#
# [allow.last_seen]
# line = 42
# column = 17
