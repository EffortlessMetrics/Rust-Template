[workspace]
members = ["crates/*", "apps/*"]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.74.0"
license = "Apache-2.0 OR MIT"

[workspace.dependencies]
anyhow = "1"
thiserror = "1"
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"

[workspace.lints.rust]
unused = "deny"
rust_2018_idioms = "deny"

[profile.release]
lto = "thin"
codegen-units = 1
