[workspace]
members = ["crates/*"]
exclude = ["examples/brownfield-demo"]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.89.0"
license = "Apache-2.0 OR MIT"
publish = false                                                  # Workspace crates are private/internal
homepage = "https://github.com/effortlessmetrics/rust-as-spec"
repository = "https://github.com/effortlessmetrics/rust-as-spec"
authors = ["EffortlessSteven"]
documentation = "https://docs.rs/as-spec"
version = "3.3.8"

[workspace.lints.rust]
unused = { level = "deny", priority = -1 }
rust_2018_idioms = { level = "deny", priority = -1 }
missing_docs = "warn"

[workspace.dependencies]
anyhow = "1.0.100"
thiserror = "2.0.17"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tracing = "0.1.43"
tracing-subscriber = { version = "0.3.22", features = ["env-filter", "fmt"] }
serde_yaml = { package = "serde_yaml_ng", version = "0.10.0" }
chrono = { version = "0.4.42", features = ["serde"] }
uuid = { version = "1.19.0", features = ["v4", "serde"] }
async-trait = "0.1.89"
url = "2.5.7"
regex = "1.12.2"
tempfile = "3.23.0"

# Testing
cucumber = { version = "0.22.0", features = ["output-junit", "output-json"] }
gherkin = "0.15.0"

# HTTP/Web
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros"] }
axum = "0.8.7"
tower = { version = "0.5.2", features = ["util"] }
http = "1.4.0"
http-body-util = "0.1.3"

# Utilities
shell-words = "1.1.1"
md5 = "0.8.0"

# OTLP Telemetry
opentelemetry = "0.31.0"
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.31.0", features = ["tonic", "trace"] }
tracing-opentelemetry = "0.32.0"
tonic = { version = "0.14.2", features = [] }

# Prometheus Metrics
prometheus = "0.14.0"

[profile.release]
lto = "thin"
codegen-units = 1

# Development profile optimizations for faster builds
[profile.dev]
# Reduce debuginfo for faster linking
debug = 1
# Use default codegen-units (256) for parallelism

# Test profile optimizations
[profile.test]
# Minimal debug info for tests
debug = 1
# Inherit most settings from dev

# Custom profile for faster dev builds with some optimization
[profile.dev-opt]
inherits = "dev"
opt-level = 1
debug = 1
