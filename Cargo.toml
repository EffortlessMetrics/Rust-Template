[workspace]
members = [
  "crates/*",
]
exclude = [
  "examples/brownfield-demo",
  "crates/adapters-db-sqlx",  # Temporarily excluded - needs async trait signature fixes
  "crates/adapters-grpc",      # Temporarily excluded - needs proto UUID→string migration
  "crates/acceptance",          # Temporarily excluded - depends on adapters
  "crates/app-http",            # Temporarily excluded - depends on adapters
  "crates/telemetry",          # Temporarily excluded - needs opentelemetry API updates
]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.89.0"
license = "Apache-2.0 OR MIT"

[workspace.lints.rust]
unused = "deny"
rust_2018_idioms = "deny"

[workspace.dependencies]
anyhow = "1.0.100"
thiserror = "2.0.17"
serde = { version = "1.0.228", features = ["derive"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "fmt"] }
serde_yaml = { package = "serde_yaml_ng", version = "0.10.0" }

# OTLP Telemetry
opentelemetry = "0.31.0"
opentelemetry-otlp = "0.31.0"
tracing-opentelemetry = "0.32.0"
tonic = "0.14.2"

# Prometheus Metrics
prometheus = "0.14.0"

[profile.release]
lto = "thin"
codegen-units = 1
