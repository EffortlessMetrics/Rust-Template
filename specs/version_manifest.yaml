# Version Manifest for Release Automation
# Schema Version: 1.0
# Purpose: Declares all version-bearing files and their update patterns for release-prepare automation
#
# This manifest is the single source of truth for version updates during releases.
# The release-prepare command uses this to update all version references consistently.
#
# Pattern Types:
# - yaml_value: YAML key-value pair (e.g., "template_version: v3.3.5")
# - heading_version: Markdown heading with version in parentheses (e.g., "# Service (v3.3.5)")
# - inline_version: Inline markdown text with version (e.g., "**Template Version:** v3.3.5")
# - badge_version: Markdown badge or link with version
# - changelog_section: CHANGELOG.md version section header
# - frontmatter_version: YAML frontmatter version field

schema_version: "1.0"
description: "Version manifest for release-prepare automation - declares all version-bearing files and update patterns"
last_updated: "2025-12-01"

# Version format specification
version_format:
  pattern: "^v?\\d+\\.\\d+\\.\\d+(-[a-zA-Z0-9.-]+)?$"
  examples:
    - "3.3.5"
    - "v3.3.5"
    - "3.3.5-kernel"
    - "v3.3.5-rc1"

# Files that contain version references
files:
  # Core specification files
  - path: "specs/spec_ledger.yaml"
    description: "Primary spec ledger with canonical template version"
    patterns:
      - marker: "template_version:"
        type: yaml_value
        format: "quoted"  # Uses "3.3.5" format
        line_pattern: "^  template_version: \"[^\"]+\"$"
        example: "  template_version: \"3.3.5\""
    required: true
    priority: 1

  - path: "specs/service_metadata.yaml"
    description: "Service metadata with template version reference"
    patterns:
      - marker: "template_version:"
        type: yaml_value
        format: "prefixed"  # Uses v3.3.5 format
        line_pattern: "^template_version: v[\\d.]+.*$"
        example: "template_version: v3.3.5"
    required: true
    priority: 1

  - path: "specs/doc_index.yaml"
    description: "Documentation index with template version"
    patterns:
      - marker: "template_version:"
        type: yaml_value
        format: "quoted"  # Uses "3.3.5" format
        line_pattern: "^template_version: \"[^\"]+\"$"
        example: "template_version: \"3.3.5\""
    required: true
    priority: 1

  - path: "specs/tasks.yaml"
    description: "Task manifest with template version reference"
    patterns:
      - marker: "template_version:"
        type: yaml_value
        format: "quoted"  # Uses "3.3.5" format
        line_pattern: "^template_version: \"[^\"]+\"$"
        example: "template_version: \"3.3.6\""
    required: true
    priority: 1

  - path: "specs/service_policies.yaml"
    description: "Service policies with template version reference"
    patterns:
      - marker: "template_version:"
        type: yaml_value
        format: "prefixed"  # Uses v3.3.5 format
        line_pattern: "^template_version: \"v[\\d.]+\"$"
        example: "template_version: \"v3.3.5\""
    required: true
    priority: 1

  # BDD feature files
  - path: "specs/features/*.feature"
    description: "Gherkin feature files with version and date headers"
    patterns:
      - marker: "# Template Version: v"
        type: inline_version
        format: "prefixed"  # v3.3.6
        line_pattern: "^# Template Version: v[\\d.]+.*$"
        example: "# Template Version: v3.3.6"
      - marker: "# Last Updated: "
        type: inline_version
        format: "date_only"  # 2025-12-01
        line_pattern: "^# Last Updated: \\d{4}-\\d{2}-\\d{2}$"
        example: "# Last Updated: 2025-12-01"
    required: false
    priority: 3
    notes: "Feature files have standardized headers; Last Updated uses current date not version number"

  # Primary documentation files
  - path: "README.md"
    description: "Repository README with multiple version references"
    patterns:
      - marker: "# Test Service (v"
        type: heading_version
        format: "prefixed_paren"  # (v3.3.5)
        line_pattern: "^# Test Service \\(v[\\d.]+\\)$"
        example: "# Test Service (v3.3.5)"
      # NOTE: Template Version is now on its own line (split from Kernel Baseline for safe updates)
      - marker: "**Template Version:**"
        type: inline_version
        format: "prefixed"  # v3.3.5
        line_pattern: "^\\*\\*Template Version:\\*\\* v[\\d.]+$"
        example: "**Template Version:** v3.3.5"
      # NOTE: Kernel Baseline is FROZEN at v3.3.9-kernel and NOT updated by release-prepare
      # It is now on its own line to prevent accidental updates
    required: true
    priority: 2

  - path: "CLAUDE.md"
    description: "Agent instructions with template version"
    patterns:
      - marker: "# CLAUDE.md – Test Service (v"
        type: heading_version
        format: "prefixed_paren"  # (v3.3.5)
        line_pattern: "^# CLAUDE\\.md – Test Service \\(v[\\d.]+\\)$"
        example: "# CLAUDE.md – Test Service (v3.3.5)"
      - marker: "**Template Version:**"
        type: inline_version
        format: "prefixed"  # v3.3.5
        line_pattern: "^\\*\\*Template Version:\\*\\* v[\\d.]+.*$"
        example: "**Template Version:** v3.3.5"
    required: true
    priority: 2

  - path: "CHANGELOG.md"
    description: "Changelog with version section headers"
    patterns:
      - marker: "## [Unreleased]"
        type: changelog_section
        format: "unreleased"
        line_pattern: "^## \\[Unreleased\\]$"
        example: "## [Unreleased]"
      - marker: "## ["
        type: changelog_section
        format: "dated_release"  # [3.3.5] - 2025-12-01
        line_pattern: "^## \\[[\\d.]+\\] - \\d{4}-\\d{2}-\\d{2}$"
        example: "## [3.3.5] - 2025-12-01"
    required: true
    priority: 1
    notes: "Requires special handling: insert new section after [Unreleased], preserve existing sections"

  # Kernel and roadmap documentation
  - path: "docs/KERNEL_SNAPSHOT.md"
    description: "Kernel snapshot with version in frontmatter and heading"
    patterns:
      - marker: "title: Kernel Snapshot v"
        type: frontmatter_version
        format: "prefixed"  # v3.3.5
        line_pattern: "^title: Kernel Snapshot v[\\d.]+.*$"
        example: "title: Kernel Snapshot v3.3.5"
      - marker: "# Kernel Snapshot v"
        type: heading_version
        format: "prefixed"  # v3.3.5
        line_pattern: "^# Kernel Snapshot v[\\d.]+.*$"
        example: "# Kernel Snapshot v3.3.5"
      # NOTE: The inline version line now separates Template Version (updatable) from Kernel Baseline (frozen at v3.3.9)
      - marker: "**Template Version:**"
        type: inline_version
        format: "prefixed"  # v3.3.5
        line_pattern: "^\\*\\*Last Updated:\\*\\* [\\d-]+ \\| \\*\\*Template Version:\\*\\* v[\\d.]+ \\| \\*\\*Kernel Baseline:\\*\\* v3\\.3\\.9-kernel$"
        example: "**Last Updated:** 2025-12-22 | **Template Version:** v3.3.5 | **Kernel Baseline:** v3.3.9-kernel"
    required: true
    priority: 2

  - path: "docs/ROADMAP.md"
    description: "Roadmap with version references"
    patterns:
      - marker: "# Roadmap: Rust-as-Spec Platform Cell (v"
        type: heading_version
        format: "prefixed_paren"  # (v3.3.5)
        line_pattern: "^# Roadmap: Rust-as-Spec Platform Cell \\(v[\\d.]+.*\\)$"
        example: "# Roadmap: Rust-as-Spec Platform Cell (v3.3.5)"
      # NOTE: "## 1. Kernel v3.3.9 Closure" is HISTORICAL - do NOT auto-update.
      # This section documents the v3.3.9-kernel baseline closure and must stay frozen.
    required: true
    priority: 3

  - path: "docs/INDEX.md"
    description: "Documentation index with version reference"
    patterns:
      - marker: "**Navigation hub for the Rust-as-Spec Platform Cell (v"
        type: inline_version
        format: "prefixed_paren"  # (v3.3.5)
        line_pattern: "^\\*\\*Navigation hub for the Rust-as-Spec Platform Cell \\(v[\\d.]+.*\\)\\*\\*$"
        example: "**Navigation hub for the Rust-as-Spec Platform Cell (v3.3.5)**"
    required: false
    priority: 4

  - path: "docs/explanation/TEMPLATE-CONTRACTS.md"
    description: "Template contracts documentation with version"
    patterns:
      - marker: "**Template Version:**"
        type: inline_version
        format: "prefixed"  # v3.3.6
        line_pattern: "^\\*\\*Template Version:\\*\\* v[\\d.]+.*$"
        example: "**Template Version:** v3.3.6"
    required: true
    priority: 3

  # Additional documentation files with version references
  - path: "docs/feature_status.md"
    description: "Auto-generated feature status with template version"
    patterns:
      - marker: "  Template Version:"
        type: inline_version
        format: "unquoted"  # 3.3.6
        line_pattern: "^  Template Version: [\\d.]+.*$"
        example: "  Template Version: 3.3.6"
    required: false
    priority: 4
    notes: "Auto-generated by precommit hook; version should match spec_ledger.yaml"

  - path: "docs/testing-strategy.md"
    description: "Testing strategy with version metadata"
    patterns:
      - marker: "**Version**:"
        type: inline_version
        format: "prefixed"  # v3.3.6
        line_pattern: "^\\*\\*Version\\*\\*: v[\\d.]+.*$"
        example: "**Version**: v3.3.6"
    required: false
    priority: 4

  - path: "docs/reference/ci-workflows.md"
    description: "CI workflows reference with version"
    patterns:
      - marker: "version:"
        type: yaml_value
        format: "unquoted"  # 3.3.6 (in frontmatter)
        line_pattern: "^version: [\\d.]+.*$"
        example: "version: 3.3.6"
    required: false
    priority: 4

  - path: "docs/explanation/json-contracts.md"
    description: "JSON contracts documentation with version"
    patterns:
      - marker: "**Template Version:**"
        type: inline_version
        format: "prefixed"  # v3.3.6
        line_pattern: "^\\*\\*Template Version:\\*\\* v[\\d.]+.*$"
        example: "**Template Version:** v3.3.6"
    required: false
    priority: 4

  - path: "docs/SKILLS_GOVERNANCE.md"
    description: "Skills governance with version alignment"
    patterns:
      - marker: "**Version**:"
        type: inline_version
        format: "prefixed"  # v3.3.6
        line_pattern: "^\\*\\*Version\\*\\*: v[\\d.]+.*$"
        example: "**Version**: v3.3.6"
    required: false
    priority: 4

  - path: "docs/AGENTS_GOVERNANCE.md"
    description: "Agents governance with version alignment"
    patterns:
      - marker: "**Version**:"
        type: inline_version
        format: "prefixed"  # v3.3.6
        line_pattern: "^\\*\\*Version\\*\\*: v[\\d.]+.*$"
        example: "**Version**: v3.3.6"
    required: false
    priority: 4

  # Release evidence (generated artifacts)
  - path: "release_evidence/v*.md"
    description: "Release evidence bundles (generated)"
    patterns:
      - marker: "# Release Evidence: v"
        type: heading_version
        format: "prefixed"  # v3.3.5
        line_pattern: "^# Release Evidence: v[\\d.]+.*$"
        example: "# Release Evidence: v3.3.5"
    required: false
    priority: 5
    notes: "Generated by release-bundle command, not manually updated"

  - path: "release_evidence/kernel_contract.v*.json"
    description: "Kernel contract JSON (generated)"
    patterns:
      - marker: "\"version\":"
        type: yaml_value
        format: "json_string"  # "3.3.5"
        line_pattern: "^  \"version\": \"[\\d.]+.*\",$"
        example: "  \"version\": \"3.3.5\","
    required: false
    priority: 5
    notes: "Generated artifact, should be regenerated not edited"

# Validation rules
validation:
  # All required files must exist
  check_required_files: true

  # All patterns must match at least once per file
  check_pattern_matches: true

  # Version format must be consistent within categories
  check_format_consistency: true

  # Changelog must have [Unreleased] section
  check_unreleased_section: true

# Update strategy for release-prepare
update_strategy:
  # Order of operations for version updates
  phases:
    - phase: 1
      description: "Update core spec files first"
      files: ["specs/spec_ledger.yaml", "specs/service_metadata.yaml", "specs/doc_index.yaml"]

    - phase: 2
      description: "Update primary documentation"
      files: ["README.md", "CLAUDE.md"]

    - phase: 3
      description: "Update kernel and contracts documentation"
      files: ["docs/KERNEL_SNAPSHOT.md", "docs/explanation/TEMPLATE-CONTRACTS.md"]

    - phase: 4
      description: "Update changelog with new version section"
      files: ["CHANGELOG.md"]
      special_handling: "insert_new_section"

    - phase: 5
      description: "Update supporting documentation"
      files: ["docs/ROADMAP.md", "docs/INDEX.md"]

  # Backup strategy
  backup_before_update: true

  # Validation after update
  validate_after_update: true

# Historical/suppressed documents
# These files contain intentional historical version references and are marked
# with `<!-- doclint:disable orphan-version -->` to suppress linting warnings.
historical_docs:
  - path: "docs/v2.1.0-plan.md"
    reason: "Historical release plan (Released 2025-11-17)"
  - path: "docs/v2.2.0-plan.md"
    reason: "Historical release plan (Released 2025-11-17)"
  - path: "docs/v2.2.0-execution-roadmap.md"
    reason: "Historical execution roadmap (Released 2025-11-17)"
  - path: "docs/v2.2.0-tracker.md"
    reason: "Historical progress tracker (Released 2025-11-17)"
  - path: "docs/v2.3.0-plan.md"
    reason: "Historical release plan (already has doclint:disable)"
  - path: "docs/RELEASE_v2.5.0.md"
    reason: "Historical release tag instructions"
  - path: "docs/TECHNICAL-FREEZE-COMPLETE.md"
    reason: "Historical checkpoint (already has doclint:disable)"
  - path: "docs/implementation-summary-2025-11-15.md"
    reason: "Historical implementation summary"
  - path: "CHANGELOG.md"
    reason: "Complete version history (preserved as release ledger)"

# Notes for maintainers
notes: |
  This manifest is used by `cargo xtask release-prepare` to update all version references consistently.

  When adding new version-bearing files:
  1. Add the file path and patterns to the files list
  2. Set appropriate priority (1=critical, 5=optional)
  3. Mark as required: true if the file must exist
  4. Test with `cargo xtask release-prepare --dry-run X.Y.Z`

  Pattern matching strategies:
  - Use line_pattern for regex matching entire lines
  - Use marker for human-readable search strings
  - Use example to document the expected format

  Version format conventions:
  - "3.3.5" (quoted, no prefix) - YAML values in spec files
  - v3.3.5 (prefixed, unquoted) - Markdown inline references
  - (v3.3.5) (prefixed, parentheses) - Markdown headings
  - v3.3.5-kernel (kernel suffix) - Kernel baseline references
  - [3.3.5] (brackets, no prefix) - CHANGELOG section headers

  Version String Categories:
  - GOVERNED: Tied to template version, updated via release-prepare
  - PINNED: External dependency versions, documented but not auto-updated
  - HISTORICAL: Old versions preserved in archived docs, suppressed via doclint:disable

  Handling Orphan Versions:
  - Governed versions: Add to 'files' list with appropriate patterns
  - Historical docs: Add `<!-- doclint:disable orphan-version -->` at file top
  - External deps: Either add to manifest or mark file as pinned
