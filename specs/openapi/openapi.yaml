openapi: 3.1.0
info:
  title: Service API
  version: 1.0.0
  description: |
    Template-based service API (Template v3.3.14).

    **Template Core Endpoints** (Keep these):
    - /health - Health check (AC-TPL-001)
    - /version - Build information (AC-TPL-002)
    - /metrics - Prometheus metrics (AC-TPL-007)
    - Error envelope - Standardized errors (AC-TPL-003, AC-TPL-004)

    **Platform Introspection Endpoints** (Governance visibility):
    - /platform/status - Governance health, ledger counts, policy status
    - /platform/docs/index - Documentation inventory with validation
    - /platform/openapi - OpenAPI spec (YAML)
    - /platform/ui/contract - Governed UI contract (screens, regions, data-uiid anchors)
    - /platform/friction - Development friction log (DevEx issues)
    - /platform/questions - Design questions and ambiguities
    - /platform/forks - Template forks/branches
    - /platform/agent/hints - Prioritized work suggestions for AI agents
    - /platform/issues - Unified issues aggregation (friction + questions + tasks)
    - /platform/graph - Full governance graph (stories → REQs → ACs → tests → docs)
    - /platform/devex/flows - Developer flows and available xtask commands
    - /platform/coverage - AC coverage summary
    - /platform/tasks - Tasks from specs/tasks.yaml with filtering
    - /platform/tasks/suggest-next - Recommended next work
    - /platform/tasks/graph - Task dependencies (JSON or Mermaid)
    - /platform/schema - Machine-readable schema definitions
    - /platform/schema/{name} - Get specific schema by name

  x-template-version: "3.3.14"
  x-schema-version: "1.0"
  x-last-updated: "2025-12-31"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - ApiKeyAuth: []

paths:
  # Template Core - Keep these in your service
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [operations]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status: { type: string, enum: [ok], description: "Health status" }
                  service: { type: string, description: "Service name" }
        "400":
          description: Invalid health check request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /version:
    get:
      summary: Version information
      operationId: getVersion
      tags: [operations]
      responses:
        "200":
          description: Current build information
          content:
            application/json:
              schema:
                type: object
                required: [version, gitSha]
                properties:
                  version: { type: string, description: "Service version from Cargo.toml" }
                  gitSha: { type: string, description: "Git commit SHA" }
        "400":
          description: Invalid version request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================================================
  # Platform Introspection Endpoints
  # These endpoints provide governance visibility for internal developer portals
  # ==========================================================================

  /platform/status:
    get:
      summary: Platform governance status
      description: |
        Returns comprehensive governance status including service metadata,
        ledger counts, DevEx metrics, friction tracking, and policy status.

        This is the primary endpoint for Backstage and other developer portal
        integrations to understand governance health.
      operationId: getPlatformStatus
      tags: [platform]
      security: []  # Platform endpoints may have separate auth
      responses:
        "200":
          description: Platform status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformStatus'
        "500":
          description: Internal server error (e.g., failed to load spec ledger)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load governance data"

  /platform/openapi:
    get:
      summary: OpenAPI specification (YAML)
      description: |
        Returns the OpenAPI document for platform endpoints as raw YAML.
        This is suitable for code generation and contract validation.
      operationId: getPlatformOpenApi
      tags: [platform]
      security: []
      responses:
        "200":
          description: OpenAPI spec retrieved successfully
          content:
            application/yaml:
              schema:
                type: string
        "500":
          description: Internal server error (e.g., failed to load OpenAPI spec)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load OpenAPI spec"

  /platform/openapi.yaml:
    get:
      summary: OpenAPI specification (YAML)
      description: |
        Alias of /platform/openapi for tooling that expects a .yaml suffix.
      operationId: getPlatformOpenApiYaml
      tags: [platform]
      security: []
      responses:
        "200":
          description: OpenAPI spec retrieved successfully
          content:
            application/yaml:
              schema:
                type: string
        "500":
          description: Internal server error (e.g., failed to load OpenAPI spec)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load OpenAPI spec"

  /platform/docs/index:
    get:
      summary: Documentation inventory
      description: |
        Returns the complete documentation inventory with health validation.
        Each document includes its type, linked stories/requirements/ACs,
        and whether it passes doc-type contract validation.
      operationId: getDocsIndex
      tags: [platform]
      security: []
      responses:
        "200":
          description: Documentation index retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocsIndex'
        "500":
          description: Internal server error (e.g., failed to load doc index)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load documentation index"

  /platform/ui/contract:
    get:
      summary: UI contract specification
      description: |
        Returns the governed UI contract defining screens, regions, and stable
        `data-uiid` anchors. Agents and external tools can rely on these anchors
        for consistent DOM element identification across releases.

        The contract is validated by `cargo xtask ui-contract-check` which verifies:
        - All region IDs are unique within a screen
        - All `data-uiid` attributes in HTML match the contract
        - Route definitions correspond to actual endpoints
      operationId: getUiContract
      tags: [platform]
      security: []
      responses:
        "200":
          description: UI contract retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UiContract'
        "500":
          description: Internal server error (e.g., failed to load UI contract)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load UI contract"

  /platform/friction:
    get:
      summary: Development friction log
      description: |
        Returns all development friction entries (DevEx issues, process problems,
        tooling pain points). Friction entries track obstacles that slow down
        development and reduce developer experience quality.

        Entries are sourced from `friction/FRICTION-*.yaml` files and include
        severity levels, categories, and resolution status.
      operationId: getFriction
      tags: [platform]
      security: []
      responses:
        "200":
          description: Friction entries retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrictionResponse'
        "500":
          description: Internal server error (e.g., failed to load friction log)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load friction log"

  /platform/questions:
    get:
      summary: Design questions
      description: |
        Returns all design questions and ambiguities with optional status filtering.
        Questions track design decisions that need clarification, architectural
        choices under consideration, or unresolved issues.

        Questions can be filtered by status: open, answered, or resolved.
      operationId: getQuestions
      tags: [platform]
      security: []
      parameters:
        - name: status
          in: query
          description: Filter by question status
          required: false
          schema:
            type: string
            enum: [open, answered, resolved]
      responses:
        "200":
          description: Questions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        "500":
          description: Internal server error (e.g., failed to load questions)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load questions"

  /platform/forks:
    get:
      summary: Template forks
      description: |
        Returns all registered template forks/branches. Forks represent
        domain-specific variations of the template, each with its own
        features, configuration, and evolution path.

        Useful for tracking template variants and understanding the
        divergence landscape across different use cases.
      operationId: getForks
      tags: [platform]
      security: []
      responses:
        "200":
          description: Forks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForksResponse'
        "500":
          description: Internal server error (e.g., failed to load forks)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load forks"

  /platform/agent/hints:
    get:
      summary: Agent work hints
      description: |
        Returns prioritized work suggestions for AI agents based on task status,
        AC coverage, and kernel health. This endpoint helps agents discover
        the most valuable work to focus on.

        Hints include:
        - Task hints: Todo/InProgress tasks with REQ/AC IDs and recommended sequences
        - Governance hints: Failing kernel ACs that need attention
        - Policy hints: Policy violations requiring remediation

        Results can be filtered by task owner, label, requirement, or hint kind.
      operationId: getAgentHints
      tags: [platform, agent-support]
      security: []
      parameters:
        - name: owner
          in: query
          description: Filter by task owner
          required: false
          schema:
            type: string
        - name: label
          in: query
          description: Filter by task label
          required: false
          schema:
            type: string
        - name: requirement
          in: query
          description: Filter by requirement ID
          required: false
          schema:
            type: string
        - name: kind
          in: query
          description: Filter by hint kind
          required: false
          schema:
            type: string
            enum: [task, governance, policy, flow]
      responses:
        "200":
          description: Agent hints retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHintsResponse'
        "500":
          description: Internal server error (e.g., failed to generate hints)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to generate agent hints"

  /platform/issues:
    get:
      summary: Unified issues aggregation
      description: |
        Returns all governance artifacts (friction, questions, tasks) as a unified
        list of issues with normalized status, priority, and filtering capabilities.

        This is the primary endpoint for tracking all open work and DevEx issues
        across the entire governance system. Issues are normalized to a common
        representation with consistent status (open/in_progress/resolved) and
        priority (1-4) regardless of their source type.

        **Ordering**: Results are sorted by priority (1=highest) then by created_at
        (most recent first), with ID as a final tie-breaker for deterministic output.

        **Pagination**: Default 50 items/page, max 100. Use `page` and `per_page`
        query parameters to navigate results.
      operationId: getIssues
      tags: [platform]
      security: []
      parameters:
        - name: kind
          in: query
          description: Filter by issue kind
          required: false
          schema:
            type: string
            enum: [friction, question, task]
        - name: status
          in: query
          description: Filter by normalized status
          required: false
          schema:
            type: string
            enum: [open, in_progress, resolved]
        - name: priority
          in: query
          description: Filter by exact priority (1=critical, 2=high, 3=medium, 4=low)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 4
        - name: min_priority
          in: query
          description: Filter by minimum priority (1=highest, so min_priority=2 returns priorities 1 and 2)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 4
        - name: from_date
          in: query
          description: Filter by date range start (ISO 8601)
          required: false
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Filter by date range end (ISO 8601)
          required: false
          schema:
            type: string
            format: date
        - name: q
          in: query
          description: Text search in id, summary, category, and labels
          required: false
          schema:
            type: string
        - name: page
          in: query
          description: Page number (1-indexed, default 1)
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Items per page (default 50, max 100)
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Issues retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IssuesResponse'
        "500":
          description: Internal server error (e.g., failed to load issues)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load issues"

  /platform/graph:
    get:
      summary: Governance graph
      description: |
        Returns the full governance traceability graph showing relationships
        between stories, requirements, acceptance criteria, tests, documents,
        and DevEx commands/flows.

        The graph provides:
        - Nodes: stories, requirements, ACs, tests, documents, commands, flows
        - Edges: contains, tested_by, documents, executes relationships
        - Mermaid export capability via the to_mermaid() method

        Use this for understanding the complete governance structure and
        visualizing traceability from business requirements to tests.
      operationId: getGraph
      tags: [platform]
      security: []
      responses:
        "200":
          description: Governance graph retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Graph'
        "500":
          description: Internal server error (e.g., failed to build graph)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load governance data"

  /platform/devex/flows:
    get:
      summary: Developer experience flows
      description: |
        Returns the DevEx flows specification containing all available
        xtask commands and workflow definitions.

        The response includes:
        - commands: Available xtask commands with categories, summaries, and requirements
        - flows: Workflow definitions with steps and documentation references

        Use this to discover available automation commands and understand
        the recommended development workflows.
      operationId: getDevexFlows
      tags: [platform]
      security: []
      responses:
        "200":
          description: DevEx flows retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevExFlows'
        "500":
          description: Internal server error (e.g., failed to load flows)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load devex flows"

  /platform/coverage:
    get:
      summary: AC coverage summary
      description: |
        Returns acceptance criteria coverage based on BDD test results.
        Coverage is computed from Cucumber JSON reports in target/ac_report.json.

        The response includes:
        - summary: Counts of passing, failing, and unknown ACs
        - details: Per-AC status with linked story, requirement, and scenarios

        ACs are marked as:
        - passing: All associated scenarios passed
        - failing: At least one scenario failed
        - unknown: No test results found for this AC
      operationId: getCoverage
      tags: [platform]
      security: []
      responses:
        "200":
          description: Coverage data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoverageResponse'

  /platform/tasks:
    get:
      summary: Task list
      description: |
        Returns all tasks from specs/tasks.yaml with optional filtering.
        Task status is overlaid from the governance repository state.

        Tasks represent work items linked to requirements and acceptance
        criteria, with metadata including owner, labels, and documentation.
      operationId: getTasks
      tags: [platform]
      security: []
      parameters:
        - name: status
          in: query
          description: Filter by task status (Todo, InProgress, Review, Done)
          required: false
          schema:
            type: string
            enum: [Todo, InProgress, Review, Done]
        - name: req
          in: query
          description: Filter by requirement ID (e.g., REQ-TPL-001)
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasksResponse'
        "500":
          description: Internal server error (e.g., failed to load tasks)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load tasks"

  /platform/tasks/suggest-next:
    get:
      summary: Suggested next steps
      description: |
        Returns a suggested sequence of actions for completing a given task.
        The suggestion is based on the task's recommended flows and DevEx
        commands, with status indicators for already-completed steps.

        The response includes:
        - task: The task ID
        - goal: Task summary/objective
        - recommended_flows: List of flow names to follow
        - recommended_sequence: Ordered list of actions (commands, docs, tests)
      operationId: getSuggestNext
      tags: [platform]
      security: []
      parameters:
        - name: task
          in: query
          description: Task ID to get suggestions for (e.g., TASK-TPL-001)
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Suggestions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestedSequence'
        "400":
          description: Missing required task parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to generate suggestion"

  /platform/tasks/graph:
    get:
      summary: Task dependency graph
      description: |
        Returns the task dependency graph showing relationships between tasks.
        The graph can be returned in JSON format (default) or as a Mermaid
        diagram for visualization.

        The graph includes:
        - nodes: Tasks with their metadata (status, requirement, owner, labels)
        - edges: Dependency relationships (depends_on)
        - blocking_relationships: Tasks that block other tasks
      operationId: getTaskGraph
      tags: [platform]
      security: []
      parameters:
        - name: format
          in: query
          description: Output format (json or mermaid)
          required: false
          schema:
            type: string
            enum: [json, mermaid]
            default: json
      responses:
        "200":
          description: Task graph retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TaskGraph'
                  - $ref: '#/components/schemas/TaskGraphMermaid'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to build task graph"

  /platform/schema:
    get:
      summary: Platform schemas
      description: |
        Returns all platform schema definitions including JSON schemas for
        spec_ledger, tasks, questions, devex_flows, config, doc_index, and
        service_metadata.

        Also includes endpoint schema information for API documentation.

        Use this for:
        - Code generation from schemas
        - Validation of YAML configuration files
        - Understanding the platform data model
      operationId: getSchema
      tags: [platform]
      security: []
      responses:
        "200":
          description: Schemas retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformSchemas'

  /platform/schema/{name}:
    get:
      summary: Get schema by name
      description: |
        Returns a specific schema by name. Available schemas include:
        - spec_ledger: Story/REQ/AC traceability ledger
        - tasks: Work item tracking
        - questions: Design questions and ambiguities
        - devex_flows: Developer workflows and commands
        - config: Service configuration
        - doc_index: Documentation inventory
        - service_metadata: Service identity
      operationId: getSchemaByName
      tags: [platform]
      security: []
      parameters:
        - name: name
          in: path
          description: Schema name (e.g., spec_ledger, tasks, questions)
          required: true
          schema:
            type: string
            enum: [spec_ledger, tasks, questions, devex_flows, config, doc_index, service_metadata]
      responses:
        "200":
          description: Schema retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaInfo'
        "404":
          description: Schema not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ErrorResponse:
      type: object
      required: [error, message, requestId]
      properties:
        error:
          type: string
          description: "Machine-readable error code"
        message:
          type: string
          description: "Human-readable message"
        requestId:
          type: string
          description: "X-Request-ID for log correlation"

    # ==========================================================================
    # Platform Status Schemas
    # ==========================================================================

    PlatformStatus:
      type: object
      description: "Complete platform governance status"
      required: [service, governance, errors]
      properties:
        service:
          $ref: '#/components/schemas/ServiceInfo'
        governance:
          $ref: '#/components/schemas/GovernanceInfo'
        config:
          description: "Runtime configuration (may be absent if no config loaded)"
          $ref: '#/components/schemas/ConfigInfo'
        errors:
          description: "Error tracking summary (AC-TPL-ERROR-MAPPING)"
          $ref: '#/components/schemas/ErrorSummary'

    ServiceInfo:
      type: object
      description: "Service metadata"
      required: [service_id, template_version, links, tags]
      properties:
        service_id:
          type: string
          description: "Unique service identifier"
        template_version:
          type: string
          description: "Template version used to create this service"
        display_name:
          type: string
          description: "Human-readable service name (optional)"
        description:
          type: string
          description: "Service description (optional)"
        links:
          type: object
          additionalProperties:
            type: string
          description: "Related links (repo, docs, etc.)"
        tags:
          type: array
          items:
            type: string
          description: "Service tags for categorization"

    GovernanceInfo:
      type: object
      description: "Full governance health metrics"
      required: [ledger, devex, docs, tasks, questions, friction, forks, policies]
      properties:
        ledger:
          $ref: '#/components/schemas/LedgerCounts'
        devex:
          $ref: '#/components/schemas/DevExCounts'
        docs:
          $ref: '#/components/schemas/DocsCounts'
        tasks:
          $ref: '#/components/schemas/TasksCounts'
        questions:
          $ref: '#/components/schemas/QuestionsInfo'
        friction:
          $ref: '#/components/schemas/FrictionInfo'
        forks:
          $ref: '#/components/schemas/ForksInfo'
        policies:
          $ref: '#/components/schemas/PoliciesInfo'

    LedgerCounts:
      type: object
      description: "Governance ledger counts"
      required: [stories, requirements, acs]
      properties:
        stories:
          type: integer
          minimum: 0
          description: "Number of user stories"
        requirements:
          type: integer
          minimum: 0
          description: "Number of requirements"
        acs:
          type: integer
          minimum: 0
          description: "Number of acceptance criteria"

    DevExCounts:
      type: object
      description: "Developer experience metrics"
      required: [commands, flows]
      properties:
        commands:
          type: integer
          minimum: 0
          description: "Number of xtask commands"
        flows:
          type: integer
          minimum: 0
          description: "Number of DevEx flows"

    DocsCounts:
      type: object
      description: "Documentation summary"
      required: [total, design, doc_type_issues]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total number of documents"
        design:
          type: integer
          minimum: 0
          description: "Number of design documents"
        doc_type_issues:
          type: integer
          minimum: 0
          description: "Documents with doc-type validation issues"

    TasksCounts:
      type: object
      description: "Task counts"
      required: [total]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total number of tasks"

    QuestionsInfo:
      type: object
      description: "Question tracking"
      required: [open, answered, resolved, total, top_open]
      properties:
        open:
          type: integer
          minimum: 0
          description: "Open questions"
        answered:
          type: integer
          minimum: 0
          description: "Answered questions"
        resolved:
          type: integer
          minimum: 0
          description: "Resolved questions"
        total:
          type: integer
          minimum: 0
          description: "Total questions"
        top_open:
          type: array
          items:
            $ref: '#/components/schemas/QuestionSummary'
          description: "Top open questions (max 3)"

    QuestionSummary:
      type: object
      description: "Question summary entry"
      required: [id, summary, flow]
      properties:
        id:
          type: string
          description: "Question ID"
        summary:
          type: string
          description: "Question summary"
        flow:
          type: string
          description: "Associated DevEx flow"

    FrictionInfo:
      type: object
      description: "Friction log tracking"
      required: [total, open, by_severity, recent]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total friction entries"
        open:
          type: integer
          minimum: 0
          description: "Open friction issues"
        by_severity:
          $ref: '#/components/schemas/SeverityCounts'
        recent:
          type: array
          items:
            $ref: '#/components/schemas/FrictionSummary'
          description: "Recent friction entries (max 5)"

    SeverityCounts:
      type: object
      description: "Friction counts by severity"
      required: [low, medium, high, critical]
      properties:
        low:
          type: integer
          minimum: 0
        medium:
          type: integer
          minimum: 0
        high:
          type: integer
          minimum: 0
        critical:
          type: integer
          minimum: 0

    FrictionSummary:
      type: object
      description: "Friction log entry summary"
      required: [id, date, severity, summary, category]
      properties:
        id:
          type: string
          description: "Friction entry ID"
        date:
          type: string
          description: "Date of friction entry"
        severity:
          type: string
          enum: [low, medium, high, critical]
          description: "Severity level"
        summary:
          type: string
          description: "Brief description"
        category:
          type: string
          description: "Friction category"

    ForksInfo:
      type: object
      description: "Fork tracking"
      required: [total, ids]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Number of forks"
        ids:
          type: array
          items:
            type: string
          description: "Fork IDs"

    PoliciesInfo:
      type: object
      description: "Policy enforcement status"
      required: [status]
      properties:
        status:
          type: string
          enum: [pass, fail, unknown]
          description: "Overall policy status ('unknown' if not yet evaluated)"

    ConfigInfo:
      type: object
      description: "Runtime configuration summary"
      required: [http_port, settings, secrets_redacted, auth]
      properties:
        env:
          type: string
          description: "Environment name (optional)"
        http_port:
          type: integer
          description: "HTTP server port"
        settings:
          type: object
          additionalProperties: true
          description: "Non-secret configuration settings"
        secrets_redacted:
          type: object
          additionalProperties:
            type: string
          description: "Secret keys with redacted values"
        auth:
          $ref: '#/components/schemas/AuthConfig'

    AuthConfig:
      type: object
      description: "Authentication configuration"
      required: [mode, token_present]
      properties:
        mode:
          type: string
          enum: [open, token, oidc]
          description: "Authentication mode"
        token_present:
          type: boolean
          description: "Whether an auth token is configured"

    # ==========================================================================
    # Error Tracking Schemas (AC-TPL-ERROR-MAPPING)
    # ==========================================================================

    ErrorSummary:
      type: object
      description: "Error tracking summary surfaced via /platform/status"
      required: [has_recent_errors, stats]
      properties:
        has_recent_errors:
          type: boolean
          description: "Whether any errors have occurred since service start"
        last_error:
          description: "The most recent error (if any)"
          $ref: '#/components/schemas/LastErrorSummary'
        stats:
          description: "Aggregated error statistics"
          $ref: '#/components/schemas/ErrorStats'

    LastErrorSummary:
      type: object
      description: "Summary of the last error that occurred"
      required: [category, message, status_code, occurred_at]
      properties:
        category:
          type: string
          description: "Error category (e.g., 'task_not_found', 'invalid_transition', 'internal')"
          example: "task_not_found"
        message:
          type: string
          description: "Human-readable error message"
          example: "Task TASK-TPL-DEMO-001 not found"
        status_code:
          type: integer
          format: int32
          minimum: 400
          maximum: 599
          description: "HTTP status code returned"
          example: 404
        occurred_at:
          type: string
          format: date-time
          description: "When the error occurred (ISO 8601)"
        request_id:
          type: string
          description: "Request ID for correlation (X-Request-ID header value)"

    ErrorStats:
      type: object
      description: "Aggregated error statistics since service start"
      required: [total_errors, client_errors, server_errors]
      properties:
        total_errors:
          type: integer
          format: int64
          minimum: 0
          description: "Total number of errors since service start"
        client_errors:
          type: integer
          format: int64
          minimum: 0
          description: "Number of 4xx client errors"
        server_errors:
          type: integer
          format: int64
          minimum: 0
          description: "Number of 5xx server errors"

    # ==========================================================================
    # Documentation Index Schemas
    # ==========================================================================

    DocsIndex:
      type: object
      description: "Documentation inventory response"
      required: [schema_version, template_version, docs, summary]
      properties:
        schema_version:
          type: string
          description: "Schema version of the docs index"
        template_version:
          type: string
          description: "Template version"
        docs:
          type: array
          items:
            $ref: '#/components/schemas/DocumentEntry'
          description: "All documents in the inventory"
        summary:
          $ref: '#/components/schemas/DocsSummary'

    DocumentEntry:
      type: object
      description: "Individual document entry"
      required: [id, file, doc_type, stories, requirements, acs, adrs, doc_type_valid]
      properties:
        id:
          type: string
          description: "Document ID"
        file:
          type: string
          description: "File path"
        doc_type:
          type: string
          enum: [adr, design_doc, impl_plan, requirements_doc, guide, how-to, how_to, explanation, reference, ci_workflow, status]
          description: "Document type"
        stories:
          type: array
          items:
            type: string
          description: "Linked user stories"
        requirements:
          type: array
          items:
            type: string
          description: "Linked requirements"
        acs:
          type: array
          items:
            type: string
          description: "Linked acceptance criteria"
        adrs:
          type: array
          items:
            type: string
          description: "Linked ADRs"
        doc_type_valid:
          type: boolean
          description: "Whether doc passes type-contract validation"
        doc_type_issue:
          type: string
          description: "Issue description if validation fails (optional)"

    DocsSummary:
      type: object
      description: "Documentation health summary"
      required: [total, valid, with_issues]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total documents"
        valid:
          type: integer
          minimum: 0
          description: "Documents passing validation"
        with_issues:
          type: integer
          minimum: 0
          description: "Documents with issues"

    # ==========================================================================
    # UI Contract Schemas
    # ==========================================================================

    UiContract:
      type: object
      description: "Governed UI contract specification defining screens and stable DOM anchors"
      required: [schema_version, template_version, screens]
      properties:
        schema_version:
          type: string
          description: "Schema version of the UI contract"
          example: "1.0"
        template_version:
          type: string
          description: "Template version"
          example: "v3.3.14"
        screens:
          type: array
          items:
            $ref: '#/components/schemas/UiScreen'
          description: "UI screen definitions"
        region_kinds:
          type: object
          additionalProperties:
            type: string
          description: "Semantic region kind definitions (e.g., header, navigation, panel)"

    UiScreen:
      type: object
      description: "A UI screen definition with routes and regions"
      required: [id, route, description, regions]
      properties:
        id:
          type: string
          description: "Unique screen identifier"
          example: "platform_dashboard"
        route:
          type: string
          description: "Primary route for the screen"
          example: "/"
        aliases:
          type: array
          items:
            type: string
          description: "Alternative routes that serve the same screen"
          example: ["/ui"]
        description:
          type: string
          description: "Human-readable description of the screen's purpose"
        regions:
          type: array
          items:
            $ref: '#/components/schemas/UiRegion'
          description: "Regions (sections) within the screen"

    UiRegion:
      type: object
      description: "A region within a UI screen, mapped to data-uiid attribute"
      required: [id, kind, description]
      properties:
        id:
          type: string
          description: "Unique region ID, used as data-uiid attribute"
          example: "dashboard.health"
        kind:
          type: string
          description: "Semantic kind: header, navigation, panel, visualization, controls, table"
          example: "panel"
        description:
          type: string
          description: "Human-readable description of the region's content"

    # ==========================================================================
    # Friction Log Schemas
    # ==========================================================================

    FrictionResponse:
      type: object
      description: "Friction log response containing all friction entries"
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FrictionEntry'
          description: "Array of friction entries"
        total:
          type: integer
          minimum: 0
          description: "Total number of friction entries"

    FrictionEntry:
      type: object
      description: "Individual friction log entry"
      required: [id, date, category, severity, summary, status]
      properties:
        id:
          type: string
          description: "Friction entry ID (e.g., FRICTION-XXX-001)"
          example: "FRICTION-TPL-001"
        date:
          type: string
          format: date
          description: "Date of friction entry"
          example: "2025-12-10"
        category:
          type: string
          description: "Friction category"
          example: "tooling"
        severity:
          type: string
          enum: [low, medium, high, critical]
          description: "Severity level"
        summary:
          type: string
          description: "Brief description of the friction"
        description:
          type: string
          description: "Detailed description of the friction (optional)"
        status:
          type: string
          enum: [open, resolved]
          description: "Resolution status"
        context:
          type: object
          additionalProperties: true
          description: "Additional context (optional)"
        resolution:
          type: object
          additionalProperties: true
          description: "Resolution details (optional)"

    # ==========================================================================
    # Questions Schemas
    # ==========================================================================

    QuestionsResponse:
      type: object
      description: "Questions response containing all question entries"
      required: [questions, total]
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionEntry'
          description: "Array of question entries"
        total:
          type: integer
          minimum: 0
          description: "Total number of questions"

    QuestionEntry:
      type: object
      description: "Individual question entry"
      required: [id, summary, status, flow, phase]
      properties:
        id:
          type: string
          description: "Question ID (e.g., Q-XXX-001)"
          example: "Q-TPL-001"
        summary:
          type: string
          description: "Question summary"
        status:
          type: string
          enum: [open, answered, resolved]
          description: "Question status"
        flow:
          type: string
          description: "Associated DevEx flow"
        phase:
          type: string
          description: "Development phase"
        created_at:
          type: string
          format: date-time
          description: "When the question was created (ISO 8601)"

    # ==========================================================================
    # Forks Schemas
    # ==========================================================================

    ForksResponse:
      type: object
      description: "Forks response containing all registered forks"
      required: [forks, total]
      properties:
        forks:
          type: array
          items:
            $ref: '#/components/schemas/ForkEntry'
          description: "Array of fork entries"
        total:
          type: integer
          minimum: 0
          description: "Total number of forks"

    ForkEntry:
      type: object
      description: "Individual fork entry"
      required: [id, name, domain, status]
      properties:
        id:
          type: string
          description: "Fork ID (e.g., FORK-XXX-001)"
          example: "FORK-AUTH-001"
        name:
          type: string
          description: "Fork name"
        domain:
          type: string
          description: "Domain or use case for the fork"
        status:
          type: string
          enum: [active, archived]
          description: "Fork status"
        kernel_version:
          type: string
          description: "Kernel version used by the fork (optional)"

    # ==========================================================================
    # Agent Hints Schemas
    # ==========================================================================

    AgentHintsResponse:
      type: object
      description: "Agent hints response containing prioritized work suggestions"
      required: [hints]
      properties:
        hints:
          type: array
          items:
            $ref: '#/components/schemas/AgentHint'
          description: "Array of agent hints sorted by priority"
        warnings:
          type: array
          items:
            type: string
          description: "Referential integrity warnings (optional)"
        warnings_structured:
          type: array
          items:
            $ref: '#/components/schemas/ReferentialWarning'
          description: "Structured referential integrity warnings (optional)"

    ReferentialWarning:
      type: object
      description: "Referential integrity warning for invalid AC/REQ references"
      required: [invalid_id, ref_type, source, message]
      properties:
        invalid_id:
          type: string
          description: "Invalid AC or REQ ID"
        ref_type:
          type: string
          description: "Reference type ('ac' or 'requirement')"
        source:
          type: string
          description: "Task ID containing the invalid reference"
        message:
          type: string
          description: "Human-readable warning message"

    AgentHint:
      type: object
      description: "Individual agent hint with work suggestion"
      required: [id, kind, priority, status, reason]
      properties:
        id:
          type: string
          description: "Hint ID"
          example: "hint-001"
        kind:
          type: string
          enum: [task, governance, policy, flow]
          description: "Hint kind"
        priority:
          type: string
          enum: [low, medium, high]
          description: "Priority level"
        status:
          type: string
          enum: [open, in_progress, done]
          description: "Current status"
        reason:
          type: object
          required: [summary]
          properties:
            summary:
              type: string
              description: "Brief reason for the hint"
            code:
              type: string
              description: "Machine-readable reason code (optional)"
            details:
              type: string
              description: "Detailed explanation (optional)"
            category:
              type: string
              description: "Hint category (optional)"
        task_id:
          type: string
          description: "Associated task ID (optional)"
        title:
          type: string
          description: "Task title (optional)"
        owner:
          type: string
          description: "Task owner (optional)"
        labels:
          type: array
          items:
            type: string
          description: "Task labels (optional)"
        requirement_ids:
          type: array
          items:
            type: string
          description: "Related requirement IDs"
        ac_ids:
          type: array
          items:
            type: string
          description: "Related AC IDs"
        recommended_sequence:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
                enum: [command, doc, flow]
              value:
                type: string
          description: "Recommended sequence of actions (optional)"

    # ==========================================================================
    # Unified Issues Schemas
    # ==========================================================================

    IssuesResponse:
      type: object
      description: "Unified issues response with pagination and summary"
      required: [issues, pagination, summary]
      properties:
        issues:
          type: array
          items:
            $ref: '#/components/schemas/Issue'
          description: "Array of normalized issues"
        pagination:
          $ref: '#/components/schemas/IssuesPagination'
        summary:
          $ref: '#/components/schemas/IssuesSummary'

    Issue:
      type: object
      description: "Unified issue representation normalizing friction, questions, and tasks"
      required: [id, kind, status, native_status, summary, priority]
      properties:
        id:
          type: string
          description: "Unique identifier (FRICTION-XXX, Q-XXX, TASK-XXX)"
          example: "FRICTION-TPL-001"
        kind:
          type: string
          enum: [friction, question, task]
          description: "Issue type"
        status:
          type: string
          enum: [open, in_progress, resolved]
          description: "Normalized status across all issue types"
        native_status:
          type: string
          description: "Original status string from source artifact"
          example: "investigating"
        summary:
          type: string
          description: "One-line summary"
        priority:
          type: integer
          minimum: 1
          maximum: 4
          description: "Priority (1=critical/p0, 2=high/p1, 3=medium/p2, 4=low/p3)"
        created_at:
          type: string
          format: date
          description: "Creation/discovery date (ISO 8601, nullable for tasks)"
        category:
          type: string
          description: "Category or flow context"
        refs:
          type: array
          items:
            type: string
          description: "Related REQ/AC IDs"
        owner:
          type: string
          description: "Owner/assignee"
        labels:
          type: array
          items:
            type: string
          description: "Labels/tags"

    IssuesPagination:
      type: object
      description: "Pagination metadata"
      required: [page, per_page, total_items, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
          description: "Current page number (1-indexed)"
        per_page:
          type: integer
          minimum: 1
          maximum: 100
          description: "Items per page"
        total_items:
          type: integer
          minimum: 0
          description: "Total number of items across all pages"
        total_pages:
          type: integer
          minimum: 0
          description: "Total number of pages"

    IssuesSummary:
      type: object
      description: "Summary counts by kind and status"
      required: [total, by_kind, by_status]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total number of issues (before pagination)"
        by_kind:
          $ref: '#/components/schemas/IssuesKindCounts'
        by_status:
          $ref: '#/components/schemas/IssuesStatusCounts'

    IssuesKindCounts:
      type: object
      description: "Issue counts by kind"
      required: [friction, question, task]
      properties:
        friction:
          type: integer
          minimum: 0
        question:
          type: integer
          minimum: 0
        task:
          type: integer
          minimum: 0

    IssuesStatusCounts:
      type: object
      description: "Issue counts by status"
      required: [open, in_progress, resolved]
      properties:
        open:
          type: integer
          minimum: 0
        in_progress:
          type: integer
          minimum: 0
        resolved:
          type: integer
          minimum: 0

    # ==========================================================================
    # Governance Graph Schemas
    # ==========================================================================

    Graph:
      type: object
      description: "Full governance traceability graph"
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
          description: "Graph nodes (stories, requirements, ACs, tests, docs, commands, flows)"
        edges:
          type: array
          items:
            $ref: '#/components/schemas/GraphEdge'
          description: "Graph edges showing relationships"

    GraphNode:
      type: object
      description: "A node in the governance graph"
      required: [id, label, type]
      properties:
        id:
          type: string
          description: "Unique node identifier"
          example: "US-TPL-001"
        label:
          type: string
          description: "Human-readable label"
          example: "User Story Title"
        type:
          type: string
          enum: [story, requirement, ac, test, document, command, flow]
          description: "Node type"
        url:
          type: string
          description: "Optional URL for the node (e.g., file:// for documents)"
        meta:
          $ref: '#/components/schemas/GraphNodeMeta'

    GraphNodeMeta:
      type: object
      description: "Additional node metadata"
      properties:
        must_have_ac:
          type: boolean
          default: false
          description: "For requirements: whether this REQ must have at least one AC"

    GraphEdge:
      type: object
      description: "An edge in the governance graph"
      required: [source, target, type]
      properties:
        source:
          type: string
          description: "Source node ID"
        target:
          type: string
          description: "Target node ID"
        type:
          type: string
          enum: [contains, tested_by, documents, executes]
          description: "Edge type describing the relationship"

    # ==========================================================================
    # DevEx Flows Schemas
    # ==========================================================================

    DevExFlows:
      type: object
      description: "Developer experience flows specification"
      required: [schema_version, commands]
      properties:
        schema_version:
          type: string
          description: "Schema version"
        template_version:
          type: string
          description: "Template version"
        commands:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CommandSpec'
          description: "Available xtask commands"
        flows:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/FlowSpec'
          description: "Workflow definitions"

    CommandSpec:
      type: object
      description: "Specification for an xtask command"
      required: [category, summary, required]
      properties:
        category:
          type: string
          enum: [onboarding, design_ac, testing, governance, release]
          description: "Command category"
        summary:
          type: string
          description: "Brief command description"
        required:
          type: boolean
          description: "Whether this command is required"
        docs:
          $ref: '#/components/schemas/DocsRequirement'

    DocsRequirement:
      type: object
      description: "Documentation requirements for a command"
      properties:
        readme_table:
          type: boolean
          description: "Should appear in README command table"
        contributing_flow:
          type: boolean
          description: "Should appear in CONTRIBUTING flow"
        claude_golden_path:
          type: boolean
          description: "Should appear in CLAUDE.md golden path"

    FlowSpec:
      type: object
      description: "Workflow specification"
      required: [name, description, steps]
      properties:
        name:
          type: string
          description: "Flow name"
        description:
          type: string
          description: "Flow description"
        required:
          type: boolean
          description: "Whether this flow is required"
        documented_in:
          type: array
          items:
            type: string
          description: "Documentation references"
        steps:
          type: array
          items:
            type: string
          description: "Ordered list of command names"

    # ==========================================================================
    # Coverage Schemas
    # ==========================================================================

    CoverageResponse:
      type: object
      description: "AC coverage response"
      required: [summary, details]
      properties:
        summary:
          $ref: '#/components/schemas/CoverageSummary'
        details:
          type: array
          items:
            $ref: '#/components/schemas/CoverageDetail'
          description: "Per-AC coverage details"

    CoverageSummary:
      type: object
      description: "Summary of AC coverage"
      required: [passing, failing, unknown, total]
      properties:
        passing:
          type: integer
          minimum: 0
          description: "Number of passing ACs"
        failing:
          type: integer
          minimum: 0
          description: "Number of failing ACs"
        unknown:
          type: integer
          minimum: 0
          description: "Number of ACs with no test results"
        total:
          type: integer
          minimum: 0
          description: "Total number of ACs"

    CoverageDetail:
      type: object
      description: "Coverage detail for a single AC"
      required: [id, title, status, story, requirement, scenarios]
      properties:
        id:
          type: string
          description: "AC ID"
          example: "AC-TPL-001"
        title:
          type: string
          description: "AC title/text"
        status:
          type: string
          enum: [passing, failing, unknown]
          description: "Coverage status"
        story:
          type: string
          description: "Parent story ID"
        requirement:
          type: string
          description: "Parent requirement ID"
        scenarios:
          type: array
          items:
            type: string
          description: "BDD scenario names covering this AC"

    # ==========================================================================
    # Tasks Schemas
    # ==========================================================================

    TasksResponse:
      type: object
      description: "Tasks list response"
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskOut'
          description: "List of tasks"

    TaskOut:
      type: object
      description: "Task output DTO"
      required: [id, title, requirement, acs, status, labels]
      properties:
        id:
          type: string
          description: "Task ID"
          example: "TASK-TPL-001"
        title:
          type: string
          description: "Task title"
        requirement:
          type: string
          description: "Related requirement ID"
        acs:
          type: array
          items:
            type: string
          description: "Related AC IDs"
        status:
          type: string
          enum: [Todo, InProgress, Review, Done]
          description: "Task status"
        owner:
          type: string
          description: "Task owner (optional)"
        labels:
          type: array
          items:
            type: string
          description: "Task labels"
        docs:
          $ref: '#/components/schemas/TaskDocsOut'

    TaskDocsOut:
      type: object
      description: "Task documentation references"
      properties:
        design:
          type: array
          items:
            type: string
          description: "Design doc IDs"
        plan:
          type: array
          items:
            type: string
          description: "Plan doc IDs"

    # ==========================================================================
    # Suggested Sequence Schemas
    # ==========================================================================

    SuggestedSequence:
      type: object
      description: "Suggested sequence of actions for a task"
      required: [task, goal, recommended_flows, recommended_sequence]
      properties:
        task:
          type: string
          description: "Task ID"
        goal:
          type: string
          description: "Task summary/objective"
        recommended_flows:
          type: array
          items:
            type: string
          description: "List of recommended flow names"
        recommended_sequence:
          type: array
          items:
            $ref: '#/components/schemas/Action'
          description: "Ordered list of actions"

    Action:
      type: object
      description: "An action in the suggested sequence"
      required: [kind]
      properties:
        kind:
          type: string
          enum: [command, doc, test, bundle]
          description: "Action type"
        command:
          type: string
          description: "Command name (for kind=command)"
        status:
          type: string
          enum: [pending, satisfied]
          description: "Whether the action is already satisfied"
        doc:
          type: string
          description: "Document reference (for kind=doc)"
        description:
          type: string
          description: "Action description"
        ac_id:
          type: string
          description: "Related AC ID (for kind=test)"

    # ==========================================================================
    # Task Graph Schemas
    # ==========================================================================

    TaskGraph:
      type: object
      description: "Task dependency graph (JSON format)"
      required: [nodes, edges, blocking_relationships]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TaskNode'
          description: "Task nodes"
        edges:
          type: array
          items:
            $ref: '#/components/schemas/TaskEdge'
          description: "Dependency edges"
        blocking_relationships:
          type: array
          items:
            $ref: '#/components/schemas/BlockingRelationship'
          description: "Blocking relationships between tasks"

    TaskGraphMermaid:
      type: object
      description: "Task dependency graph (Mermaid format)"
      required: [mermaid]
      properties:
        mermaid:
          type: string
          description: "Mermaid diagram source"

    TaskNode:
      type: object
      description: "A node in the task graph"
      required: [id, title, status, requirement, labels]
      properties:
        id:
          type: string
          description: "Task ID"
        title:
          type: string
          description: "Task title"
        status:
          type: string
          description: "Task status"
        requirement:
          type: string
          description: "Related requirement ID"
        owner:
          type: string
          description: "Task owner (optional)"
        labels:
          type: array
          items:
            type: string
          description: "Task labels"

    TaskEdge:
      type: object
      description: "A dependency edge in the task graph"
      required: [from, to, edge_type]
      properties:
        from:
          type: string
          description: "Source task ID"
        to:
          type: string
          description: "Target task ID"
        edge_type:
          type: string
          enum: [depends_on, same_requirement]
          description: "Edge type"

    BlockingRelationship:
      type: object
      description: "A blocking relationship between tasks"
      required: [blocker, blocked, reason]
      properties:
        blocker:
          type: string
          description: "Task that is blocking"
        blocked:
          type: string
          description: "Task that is blocked"
        reason:
          type: string
          description: "Reason for the blocking relationship"

    # ==========================================================================
    # Platform Schemas Schemas
    # ==========================================================================

    PlatformSchemas:
      type: object
      description: "All platform schema definitions"
      required: [schemas, endpoints]
      properties:
        schemas:
          type: array
          items:
            $ref: '#/components/schemas/SchemaInfo'
          description: "Available schema definitions"
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/EndpointSchema'
          description: "API endpoint documentation"

    SchemaInfo:
      type: object
      description: "Information about a specific schema"
      required: [name, version, description, source_file, json_schema]
      properties:
        name:
          type: string
          description: "Schema name"
          example: "spec_ledger"
        version:
          type: string
          description: "Schema version"
          example: "1.0"
        description:
          type: string
          description: "Schema description"
        source_file:
          type: string
          description: "Source file path"
          example: "specs/spec_ledger.yaml"
        json_schema:
          type: object
          additionalProperties: true
          description: "JSON Schema definition"

    EndpointSchema:
      type: object
      description: "API endpoint schema information"
      required: [path, method, description, response_type]
      properties:
        path:
          type: string
          description: "Endpoint path"
          example: "/platform/status"
        method:
          type: string
          description: "HTTP method"
          example: "GET"
        description:
          type: string
          description: "Endpoint description"
        request_type:
          type: string
          description: "Request type description (optional)"
        response_type:
          type: string
          description: "Response type name"
