openapi: 3.1.0
info: { title: Payments API, version: 1.0.0 }
paths:
  /refunds:
    post:
      operationId: createRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, amountCents]
              properties:
                orderId: { type: string }
                amountCents: { type: integer, minimum: 0 }
      responses:
        "201":
          description: Refund created successfully
          content:
            application/json:
              schema:
                type: object
                required: [refundId, orderId, amountCents, status]
                properties:
                  refundId: { type: string, description: "Unique refund identifier" }
                  orderId: { type: string, description: "Original order identifier" }
                  amountCents: { type: integer, minimum: 0, description: "Refund amount in cents" }
                  status: { type: string, enum: [pending, approved, rejected], description: "Refund status" }
        "400":
          description: Bad request (e.g., amount is zero)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
        "500":
          description: Internal error (e.g., refund processing unavailable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
