openapi: 3.1.0
info: { title: Payments API, version: 1.0.0 }
paths:
  /refunds:
    post:
      operationId: createRefund
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, amountCents]
              properties:
                orderId: { type: string }
                amountCents: { type: integer, minimum: 0 }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                required: [refundId]
                properties: { refundId: { type: string } }
