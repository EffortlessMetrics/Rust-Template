openapi: 3.1.0
info:
  title: Service API
  version: 1.0.0
  description: |
    Template-based service API (Template v3.3.14).

    **Template Core Endpoints** (Keep these):
    - /health - Health check (AC-TPL-001)
    - /version - Build information (AC-TPL-002)
    - /metrics - Prometheus metrics (AC-TPL-007)
    - Error envelope - Standardized errors (AC-TPL-003, AC-TPL-004)

    **Platform Introspection Endpoints** (Governance visibility):
    - /platform/status - Governance health, ledger counts, policy status
    - /platform/docs/index - Documentation inventory with validation
    - /platform/openapi - OpenAPI spec (YAML)
    - /platform/ui/contract - Governed UI contract (screens, regions, data-uiid anchors)
    - /platform/friction - Development friction log (DevEx issues)
    - /platform/questions - Design questions and ambiguities
    - /platform/forks - Template forks/branches
    - /platform/agent/hints - Prioritized work suggestions for AI agents

  x-template-version: "3.3.14"
  x-schema-version: "1.0"
  x-last-updated: "2025-12-30"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - ApiKeyAuth: []

paths:
  # Template Core - Keep these in your service
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [operations]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status: { type: string, enum: [ok], description: "Health status" }
                  service: { type: string, description: "Service name" }
        "400":
          description: Invalid health check request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /version:
    get:
      summary: Version information
      operationId: getVersion
      tags: [operations]
      responses:
        "200":
          description: Current build information
          content:
            application/json:
              schema:
                type: object
                required: [version, gitSha]
                properties:
                  version: { type: string, description: "Service version from Cargo.toml" }
                  gitSha: { type: string, description: "Git commit SHA" }
        "400":
          description: Invalid version request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================================================
  # Platform Introspection Endpoints
  # These endpoints provide governance visibility for internal developer portals
  # ==========================================================================

  /platform/status:
    get:
      summary: Platform governance status
      description: |
        Returns comprehensive governance status including service metadata,
        ledger counts, DevEx metrics, friction tracking, and policy status.

        This is the primary endpoint for Backstage and other developer portal
        integrations to understand governance health.
      operationId: getPlatformStatus
      tags: [platform]
      security: []  # Platform endpoints may have separate auth
      responses:
        "200":
          description: Platform status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformStatus'
        "500":
          description: Internal server error (e.g., failed to load spec ledger)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load governance data"

  /platform/openapi:
    get:
      summary: OpenAPI specification (YAML)
      description: |
        Returns the OpenAPI document for platform endpoints as raw YAML.
        This is suitable for code generation and contract validation.
      operationId: getPlatformOpenApi
      tags: [platform]
      security: []
      responses:
        "200":
          description: OpenAPI spec retrieved successfully
          content:
            application/yaml:
              schema:
                type: string
        "500":
          description: Internal server error (e.g., failed to load OpenAPI spec)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load OpenAPI spec"

  /platform/openapi.yaml:
    get:
      summary: OpenAPI specification (YAML)
      description: |
        Alias of /platform/openapi for tooling that expects a .yaml suffix.
      operationId: getPlatformOpenApiYaml
      tags: [platform]
      security: []
      responses:
        "200":
          description: OpenAPI spec retrieved successfully
          content:
            application/yaml:
              schema:
                type: string
        "500":
          description: Internal server error (e.g., failed to load OpenAPI spec)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load OpenAPI spec"

  /platform/docs/index:
    get:
      summary: Documentation inventory
      description: |
        Returns the complete documentation inventory with health validation.
        Each document includes its type, linked stories/requirements/ACs,
        and whether it passes doc-type contract validation.
      operationId: getDocsIndex
      tags: [platform]
      security: []
      responses:
        "200":
          description: Documentation index retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocsIndex'
        "500":
          description: Internal server error (e.g., failed to load doc index)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load documentation index"

  /platform/ui/contract:
    get:
      summary: UI contract specification
      description: |
        Returns the governed UI contract defining screens, regions, and stable
        `data-uiid` anchors. Agents and external tools can rely on these anchors
        for consistent DOM element identification across releases.

        The contract is validated by `cargo xtask ui-contract-check` which verifies:
        - All region IDs are unique within a screen
        - All `data-uiid` attributes in HTML match the contract
        - Route definitions correspond to actual endpoints
      operationId: getUiContract
      tags: [platform]
      security: []
      responses:
        "200":
          description: UI contract retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UiContract'
        "500":
          description: Internal server error (e.g., failed to load UI contract)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load UI contract"

  /platform/friction:
    get:
      summary: Development friction log
      description: |
        Returns all development friction entries (DevEx issues, process problems,
        tooling pain points). Friction entries track obstacles that slow down
        development and reduce developer experience quality.

        Entries are sourced from `friction/FRICTION-*.yaml` files and include
        severity levels, categories, and resolution status.
      operationId: getFriction
      tags: [platform]
      security: []
      responses:
        "200":
          description: Friction entries retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrictionResponse'
        "500":
          description: Internal server error (e.g., failed to load friction log)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load friction log"

  /platform/questions:
    get:
      summary: Design questions
      description: |
        Returns all design questions and ambiguities with optional status filtering.
        Questions track design decisions that need clarification, architectural
        choices under consideration, or unresolved issues.

        Questions can be filtered by status: open, answered, or resolved.
      operationId: getQuestions
      tags: [platform]
      security: []
      parameters:
        - name: status
          in: query
          description: Filter by question status
          required: false
          schema:
            type: string
            enum: [open, answered, resolved]
      responses:
        "200":
          description: Questions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        "500":
          description: Internal server error (e.g., failed to load questions)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load questions"

  /platform/forks:
    get:
      summary: Template forks
      description: |
        Returns all registered template forks/branches. Forks represent
        domain-specific variations of the template, each with its own
        features, configuration, and evolution path.

        Useful for tracking template variants and understanding the
        divergence landscape across different use cases.
      operationId: getForks
      tags: [platform]
      security: []
      responses:
        "200":
          description: Forks retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForksResponse'
        "500":
          description: Internal server error (e.g., failed to load forks)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to load forks"

  /platform/agent/hints:
    get:
      summary: Agent work hints
      description: |
        Returns prioritized work suggestions for AI agents based on task status,
        AC coverage, and kernel health. This endpoint helps agents discover
        the most valuable work to focus on.

        Hints include:
        - Task hints: Todo/InProgress tasks with REQ/AC IDs and recommended sequences
        - Governance hints: Failing kernel ACs that need attention
        - Policy hints: Policy violations requiring remediation

        Results can be filtered by task owner, label, requirement, or hint kind.
      operationId: getAgentHints
      tags: [platform, agent-support]
      security: []
      parameters:
        - name: owner
          in: query
          description: Filter by task owner
          required: false
          schema:
            type: string
        - name: label
          in: query
          description: Filter by task label
          required: false
          schema:
            type: string
        - name: requirement
          in: query
          description: Filter by requirement ID
          required: false
          schema:
            type: string
        - name: kind
          in: query
          description: Filter by hint kind
          required: false
          schema:
            type: string
            enum: [task, governance, policy, flow]
      responses:
        "200":
          description: Agent hints retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHintsResponse'
        "500":
          description: Internal server error (e.g., failed to generate hints)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Failed to generate agent hints"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    ErrorResponse:
      type: object
      required: [error, message, requestId]
      properties:
        error:
          type: string
          description: "Machine-readable error code"
        message:
          type: string
          description: "Human-readable message"
        requestId:
          type: string
          description: "X-Request-ID for log correlation"

    # ==========================================================================
    # Platform Status Schemas
    # ==========================================================================

    PlatformStatus:
      type: object
      description: "Complete platform governance status"
      required: [service, governance, errors]
      properties:
        service:
          $ref: '#/components/schemas/ServiceInfo'
        governance:
          $ref: '#/components/schemas/GovernanceInfo'
        config:
          description: "Runtime configuration (may be absent if no config loaded)"
          $ref: '#/components/schemas/ConfigInfo'
        errors:
          description: "Error tracking summary (AC-TPL-ERROR-MAPPING)"
          $ref: '#/components/schemas/ErrorSummary'

    ServiceInfo:
      type: object
      description: "Service metadata"
      required: [service_id, template_version, links, tags]
      properties:
        service_id:
          type: string
          description: "Unique service identifier"
        template_version:
          type: string
          description: "Template version used to create this service"
        display_name:
          type: string
          description: "Human-readable service name (optional)"
        description:
          type: string
          description: "Service description (optional)"
        links:
          type: object
          additionalProperties:
            type: string
          description: "Related links (repo, docs, etc.)"
        tags:
          type: array
          items:
            type: string
          description: "Service tags for categorization"

    GovernanceInfo:
      type: object
      description: "Full governance health metrics"
      required: [ledger, devex, docs, tasks, questions, friction, forks, policies]
      properties:
        ledger:
          $ref: '#/components/schemas/LedgerCounts'
        devex:
          $ref: '#/components/schemas/DevExCounts'
        docs:
          $ref: '#/components/schemas/DocsCounts'
        tasks:
          $ref: '#/components/schemas/TasksCounts'
        questions:
          $ref: '#/components/schemas/QuestionsInfo'
        friction:
          $ref: '#/components/schemas/FrictionInfo'
        forks:
          $ref: '#/components/schemas/ForksInfo'
        policies:
          $ref: '#/components/schemas/PoliciesInfo'

    LedgerCounts:
      type: object
      description: "Governance ledger counts"
      required: [stories, requirements, acs]
      properties:
        stories:
          type: integer
          minimum: 0
          description: "Number of user stories"
        requirements:
          type: integer
          minimum: 0
          description: "Number of requirements"
        acs:
          type: integer
          minimum: 0
          description: "Number of acceptance criteria"

    DevExCounts:
      type: object
      description: "Developer experience metrics"
      required: [commands, flows]
      properties:
        commands:
          type: integer
          minimum: 0
          description: "Number of xtask commands"
        flows:
          type: integer
          minimum: 0
          description: "Number of DevEx flows"

    DocsCounts:
      type: object
      description: "Documentation summary"
      required: [total, design, doc_type_issues]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total number of documents"
        design:
          type: integer
          minimum: 0
          description: "Number of design documents"
        doc_type_issues:
          type: integer
          minimum: 0
          description: "Documents with doc-type validation issues"

    TasksCounts:
      type: object
      description: "Task counts"
      required: [total]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total number of tasks"

    QuestionsInfo:
      type: object
      description: "Question tracking"
      required: [open, answered, resolved, total, top_open]
      properties:
        open:
          type: integer
          minimum: 0
          description: "Open questions"
        answered:
          type: integer
          minimum: 0
          description: "Answered questions"
        resolved:
          type: integer
          minimum: 0
          description: "Resolved questions"
        total:
          type: integer
          minimum: 0
          description: "Total questions"
        top_open:
          type: array
          items:
            $ref: '#/components/schemas/QuestionSummary'
          description: "Top open questions (max 3)"

    QuestionSummary:
      type: object
      description: "Question summary entry"
      required: [id, summary, flow]
      properties:
        id:
          type: string
          description: "Question ID"
        summary:
          type: string
          description: "Question summary"
        flow:
          type: string
          description: "Associated DevEx flow"

    FrictionInfo:
      type: object
      description: "Friction log tracking"
      required: [total, open, by_severity, recent]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total friction entries"
        open:
          type: integer
          minimum: 0
          description: "Open friction issues"
        by_severity:
          $ref: '#/components/schemas/SeverityCounts'
        recent:
          type: array
          items:
            $ref: '#/components/schemas/FrictionSummary'
          description: "Recent friction entries (max 5)"

    SeverityCounts:
      type: object
      description: "Friction counts by severity"
      required: [low, medium, high, critical]
      properties:
        low:
          type: integer
          minimum: 0
        medium:
          type: integer
          minimum: 0
        high:
          type: integer
          minimum: 0
        critical:
          type: integer
          minimum: 0

    FrictionSummary:
      type: object
      description: "Friction log entry summary"
      required: [id, date, severity, summary, category]
      properties:
        id:
          type: string
          description: "Friction entry ID"
        date:
          type: string
          description: "Date of friction entry"
        severity:
          type: string
          enum: [low, medium, high, critical]
          description: "Severity level"
        summary:
          type: string
          description: "Brief description"
        category:
          type: string
          description: "Friction category"

    ForksInfo:
      type: object
      description: "Fork tracking"
      required: [total, ids]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Number of forks"
        ids:
          type: array
          items:
            type: string
          description: "Fork IDs"

    PoliciesInfo:
      type: object
      description: "Policy enforcement status"
      required: [status]
      properties:
        status:
          type: string
          enum: [pass, fail, unknown]
          description: "Overall policy status ('unknown' if not yet evaluated)"

    ConfigInfo:
      type: object
      description: "Runtime configuration summary"
      required: [http_port, settings, secrets_redacted, auth]
      properties:
        env:
          type: string
          description: "Environment name (optional)"
        http_port:
          type: integer
          description: "HTTP server port"
        settings:
          type: object
          additionalProperties: true
          description: "Non-secret configuration settings"
        secrets_redacted:
          type: object
          additionalProperties:
            type: string
          description: "Secret keys with redacted values"
        auth:
          $ref: '#/components/schemas/AuthConfig'

    AuthConfig:
      type: object
      description: "Authentication configuration"
      required: [mode, token_present]
      properties:
        mode:
          type: string
          enum: [open, token, oidc]
          description: "Authentication mode"
        token_present:
          type: boolean
          description: "Whether an auth token is configured"

    # ==========================================================================
    # Error Tracking Schemas (AC-TPL-ERROR-MAPPING)
    # ==========================================================================

    ErrorSummary:
      type: object
      description: "Error tracking summary surfaced via /platform/status"
      required: [has_recent_errors, stats]
      properties:
        has_recent_errors:
          type: boolean
          description: "Whether any errors have occurred since service start"
        last_error:
          description: "The most recent error (if any)"
          $ref: '#/components/schemas/LastErrorSummary'
        stats:
          description: "Aggregated error statistics"
          $ref: '#/components/schemas/ErrorStats'

    LastErrorSummary:
      type: object
      description: "Summary of the last error that occurred"
      required: [category, message, status_code, occurred_at]
      properties:
        category:
          type: string
          description: "Error category (e.g., 'task_not_found', 'invalid_transition', 'internal')"
          example: "task_not_found"
        message:
          type: string
          description: "Human-readable error message"
          example: "Task TASK-TPL-DEMO-001 not found"
        status_code:
          type: integer
          format: int32
          minimum: 400
          maximum: 599
          description: "HTTP status code returned"
          example: 404
        occurred_at:
          type: string
          format: date-time
          description: "When the error occurred (ISO 8601)"
        request_id:
          type: string
          description: "Request ID for correlation (X-Request-ID header value)"

    ErrorStats:
      type: object
      description: "Aggregated error statistics since service start"
      required: [total_errors, client_errors, server_errors]
      properties:
        total_errors:
          type: integer
          format: int64
          minimum: 0
          description: "Total number of errors since service start"
        client_errors:
          type: integer
          format: int64
          minimum: 0
          description: "Number of 4xx client errors"
        server_errors:
          type: integer
          format: int64
          minimum: 0
          description: "Number of 5xx server errors"

    # ==========================================================================
    # Documentation Index Schemas
    # ==========================================================================

    DocsIndex:
      type: object
      description: "Documentation inventory response"
      required: [schema_version, template_version, docs, summary]
      properties:
        schema_version:
          type: string
          description: "Schema version of the docs index"
        template_version:
          type: string
          description: "Template version"
        docs:
          type: array
          items:
            $ref: '#/components/schemas/DocumentEntry'
          description: "All documents in the inventory"
        summary:
          $ref: '#/components/schemas/DocsSummary'

    DocumentEntry:
      type: object
      description: "Individual document entry"
      required: [id, file, doc_type, stories, requirements, acs, adrs, doc_type_valid]
      properties:
        id:
          type: string
          description: "Document ID"
        file:
          type: string
          description: "File path"
        doc_type:
          type: string
          enum: [adr, design_doc, impl_plan, requirements_doc, guide, how-to, how_to, explanation, reference, ci_workflow, status]
          description: "Document type"
        stories:
          type: array
          items:
            type: string
          description: "Linked user stories"
        requirements:
          type: array
          items:
            type: string
          description: "Linked requirements"
        acs:
          type: array
          items:
            type: string
          description: "Linked acceptance criteria"
        adrs:
          type: array
          items:
            type: string
          description: "Linked ADRs"
        doc_type_valid:
          type: boolean
          description: "Whether doc passes type-contract validation"
        doc_type_issue:
          type: string
          description: "Issue description if validation fails (optional)"

    DocsSummary:
      type: object
      description: "Documentation health summary"
      required: [total, valid, with_issues]
      properties:
        total:
          type: integer
          minimum: 0
          description: "Total documents"
        valid:
          type: integer
          minimum: 0
          description: "Documents passing validation"
        with_issues:
          type: integer
          minimum: 0
          description: "Documents with issues"

    # ==========================================================================
    # UI Contract Schemas
    # ==========================================================================

    UiContract:
      type: object
      description: "Governed UI contract specification defining screens and stable DOM anchors"
      required: [schema_version, template_version, screens]
      properties:
        schema_version:
          type: string
          description: "Schema version of the UI contract"
          example: "1.0"
        template_version:
          type: string
          description: "Template version"
          example: "v3.3.14"
        screens:
          type: array
          items:
            $ref: '#/components/schemas/UiScreen'
          description: "UI screen definitions"
        region_kinds:
          type: object
          additionalProperties:
            type: string
          description: "Semantic region kind definitions (e.g., header, navigation, panel)"

    UiScreen:
      type: object
      description: "A UI screen definition with routes and regions"
      required: [id, route, description, regions]
      properties:
        id:
          type: string
          description: "Unique screen identifier"
          example: "platform_dashboard"
        route:
          type: string
          description: "Primary route for the screen"
          example: "/"
        aliases:
          type: array
          items:
            type: string
          description: "Alternative routes that serve the same screen"
          example: ["/ui"]
        description:
          type: string
          description: "Human-readable description of the screen's purpose"
        regions:
          type: array
          items:
            $ref: '#/components/schemas/UiRegion'
          description: "Regions (sections) within the screen"

    UiRegion:
      type: object
      description: "A region within a UI screen, mapped to data-uiid attribute"
      required: [id, kind, description]
      properties:
        id:
          type: string
          description: "Unique region ID, used as data-uiid attribute"
          example: "dashboard.health"
        kind:
          type: string
          description: "Semantic kind: header, navigation, panel, visualization, controls, table"
          example: "panel"
        description:
          type: string
          description: "Human-readable description of the region's content"

    # ==========================================================================
    # Friction Log Schemas
    # ==========================================================================

    FrictionResponse:
      type: object
      description: "Friction log response containing all friction entries"
      required: [entries, total]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/FrictionEntry'
          description: "Array of friction entries"
        total:
          type: integer
          minimum: 0
          description: "Total number of friction entries"

    FrictionEntry:
      type: object
      description: "Individual friction log entry"
      required: [id, date, category, severity, summary, status]
      properties:
        id:
          type: string
          description: "Friction entry ID (e.g., FRICTION-XXX-001)"
          example: "FRICTION-TPL-001"
        date:
          type: string
          format: date
          description: "Date of friction entry"
          example: "2025-12-10"
        category:
          type: string
          description: "Friction category"
          example: "tooling"
        severity:
          type: string
          enum: [low, medium, high, critical]
          description: "Severity level"
        summary:
          type: string
          description: "Brief description of the friction"
        description:
          type: string
          description: "Detailed description of the friction (optional)"
        status:
          type: string
          enum: [open, resolved]
          description: "Resolution status"
        context:
          type: object
          additionalProperties: true
          description: "Additional context (optional)"
        resolution:
          type: object
          additionalProperties: true
          description: "Resolution details (optional)"

    # ==========================================================================
    # Questions Schemas
    # ==========================================================================

    QuestionsResponse:
      type: object
      description: "Questions response containing all question entries"
      required: [questions, total]
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionEntry'
          description: "Array of question entries"
        total:
          type: integer
          minimum: 0
          description: "Total number of questions"

    QuestionEntry:
      type: object
      description: "Individual question entry"
      required: [id, summary, status, flow, phase]
      properties:
        id:
          type: string
          description: "Question ID (e.g., Q-XXX-001)"
          example: "Q-TPL-001"
        summary:
          type: string
          description: "Question summary"
        status:
          type: string
          enum: [open, answered, resolved]
          description: "Question status"
        flow:
          type: string
          description: "Associated DevEx flow"
        phase:
          type: string
          description: "Development phase"
        created_at:
          type: string
          format: date-time
          description: "When the question was created (ISO 8601)"

    # ==========================================================================
    # Forks Schemas
    # ==========================================================================

    ForksResponse:
      type: object
      description: "Forks response containing all registered forks"
      required: [forks, total]
      properties:
        forks:
          type: array
          items:
            $ref: '#/components/schemas/ForkEntry'
          description: "Array of fork entries"
        total:
          type: integer
          minimum: 0
          description: "Total number of forks"

    ForkEntry:
      type: object
      description: "Individual fork entry"
      required: [id, name, domain, status]
      properties:
        id:
          type: string
          description: "Fork ID (e.g., FORK-XXX-001)"
          example: "FORK-AUTH-001"
        name:
          type: string
          description: "Fork name"
        domain:
          type: string
          description: "Domain or use case for the fork"
        status:
          type: string
          enum: [active, archived]
          description: "Fork status"
        kernel_version:
          type: string
          description: "Kernel version used by the fork (optional)"

    # ==========================================================================
    # Agent Hints Schemas
    # ==========================================================================

    AgentHintsResponse:
      type: object
      description: "Agent hints response containing prioritized work suggestions"
      required: [hints]
      properties:
        hints:
          type: array
          items:
            $ref: '#/components/schemas/AgentHint'
          description: "Array of agent hints sorted by priority"
        warnings:
          type: array
          items:
            type: string
          description: "Referential integrity warnings (optional)"
        warnings_structured:
          type: array
          items:
            $ref: '#/components/schemas/ReferentialWarning'
          description: "Structured referential integrity warnings (optional)"

    ReferentialWarning:
      type: object
      description: "Referential integrity warning for invalid AC/REQ references"
      required: [invalid_id, ref_type, source, message]
      properties:
        invalid_id:
          type: string
          description: "Invalid AC or REQ ID"
        ref_type:
          type: string
          description: "Reference type ('ac' or 'requirement')"
        source:
          type: string
          description: "Task ID containing the invalid reference"
        message:
          type: string
          description: "Human-readable warning message"

    AgentHint:
      type: object
      description: "Individual agent hint with work suggestion"
      required: [id, kind, priority, status, reason]
      properties:
        id:
          type: string
          description: "Hint ID"
          example: "hint-001"
        kind:
          type: string
          enum: [task, governance, policy, flow]
          description: "Hint kind"
        priority:
          type: string
          enum: [low, medium, high]
          description: "Priority level"
        status:
          type: string
          enum: [open, in_progress, done]
          description: "Current status"
        reason:
          type: object
          required: [summary]
          properties:
            summary:
              type: string
              description: "Brief reason for the hint"
            code:
              type: string
              description: "Machine-readable reason code (optional)"
            details:
              type: string
              description: "Detailed explanation (optional)"
            category:
              type: string
              description: "Hint category (optional)"
        task_id:
          type: string
          description: "Associated task ID (optional)"
        title:
          type: string
          description: "Task title (optional)"
        owner:
          type: string
          description: "Task owner (optional)"
        labels:
          type: array
          items:
            type: string
          description: "Task labels (optional)"
        requirement_ids:
          type: array
          items:
            type: string
          description: "Related requirement IDs"
        ac_ids:
          type: array
          items:
            type: string
          description: "Related AC IDs"
        recommended_sequence:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
                enum: [command, doc, flow]
              value:
                type: string
          description: "Recommended sequence of actions (optional)"
