# DevEx Flows Specification
# Version: 1.0.0
# Purpose: Canonical definition of xtask commands, categories, and workflows
# This file is the authoritative source for developer experience flows

schema_version: "1.0"
template_version: "v3.3.8"

commands:
  # Onboarding
  doctor:
    category: onboarding
    summary: "Validate environment (Rust, Nix, tools)"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  check:
    category: onboarding
    summary: "Fast dev loop (fmt + clippy + tests)"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  selftest:
    category: onboarding
    summary: "Full gate (BDD + AC + policies)"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  ci-local:
    category: onboarding
    summary: "Run CI checks locally (doctor + selftest + audit + docs)"
    required: false
    docs:
      readme_table: true
      contributing_flow: false
      claude_golden_path: true

  install-hooks:
    category: onboarding
    summary: "Install git hooks for pre-commit governance"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  dev-up:
    category: onboarding
    summary: "One-command developer bootstrap (doctor + install-hooks + check)"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  status:
    category: onboarding
    summary: "Show governance status dashboard (version, REQ/AC/task counts, selftest status)"
    required: true
    docs:
      readme_table: true
      contributing_flow: false
      claude_golden_path: true

  service-init:
    category: onboarding
    summary: "Initialize service branding (ID, name, description in metadata, README, CLAUDE.md)"
    required: true
    docs:
      readme_table: true
      contributing_flow: false
      claude_golden_path: true

  # Design & AC
  adr-new:
    category: design_ac
    summary: "Create architecture decision record"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  adr-check:
    category: design_ac
    summary: "Validate ADR references and linkage"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  ac-new:
    category: design_ac
    summary: "Scaffold new acceptance criterion"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  ac-status:
    category: design_ac
    summary: "Generate AC coverage/status report"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  bundle:
    category: design_ac
    summary: "Generate LLM context bundle"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  bdd:
    category: design_ac
    summary: "Run BDD acceptance tests"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  # Security
  audit:
    category: security
    summary: "Security & license audit (cargo-audit + cargo-deny)"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  coverage:
    category: security
    summary: "Test coverage analysis with tarpaulin (baseline: 65%)"
    required: false
    docs:
      readme_table: true
      contributing_flow: false
      claude_golden_path: true

  sbom-local:
    category: security
    summary: "Generate local SPDX SBOM"
    required: false
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: true

  # Build Metrics
  build-time-capture:
    category: infrastructure
    summary: "Capture build time metrics (clean release build)"
    required: false
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  build-time-compare:
    category: infrastructure
    summary: "Compare two build time metric files"
    required: false
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  # Release
  release-prepare:
    category: release
    summary: "Bump versions & seed changelog"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  release-verify:
    category: release
    summary: "Pre-release gate (selftest + audit + docs)"
    required: true
    docs:
      readme_table: true
      contributing_flow: true
      claude_golden_path: true

  # Docs
  docs-check:
    category: docs
    summary: "Verify version alignment & generated docs"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  # Infrastructure
  deploy:
    category: infrastructure
    summary: "Deploy to environment"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  migrate:
    category: infrastructure
    summary: "Run database migrations"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  hakari:
    category: infrastructure
    summary: "Manage workspace dependencies"
    required: false
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  pin-actions:
    category: infrastructure
    summary: "Pin GitHub Actions to SHAs"
    required: false
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  clean:
    category: infrastructure
    summary: "Clean workspace artifacts"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  fmt-all:
    category: infrastructure
    summary: "Format Rust and related artifacts"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  policy-test:
    category: infrastructure
    summary: "Run Rego/OPA policy tests"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  quickstart:
    category: infrastructure
    summary: "Minimal smoke-check"
    required: false
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: false

  # Platform Introspection
  tasks-list:
    category: platform
    summary: "List tasks from specs/tasks.yaml"
    required: true
    docs:
      readme_table: true
      contributing_flow: false
      claude_golden_path: true

  suggest-next:
    category: platform
    summary: "Suggest next steps for a task"
    required: true
    docs:
      readme_table: true
      contributing_flow: false
      claude_golden_path: true

  graph-export:
    category: platform
    summary: "Export governance graph (JSON or Mermaid)"
    required: true
    docs:
      readme_table: false
      contributing_flow: false
      claude_golden_path: true

  # Meta
  help-flows:
    category: meta
    summary: "Show flow-based command map"
    required: true
    docs:
      readme_table: true
      contributing_flow: false
      claude_golden_path: true

flows:
  onboarding:
    name: "Onboarding (new developer / machine)"
    description: "Validate environment, discover workflows, reach first green check"
    required: true
    documented_in: ["CONTRIBUTING.md", "CLAUDE.md", "README.md"]
    steps: ["dev-up", "service-init", "status", "selftest"]

  onboarding_manual:
    name: "Manual onboarding (step-by-step)"
    description: "Alternative to dev-up for understanding each step"
    required: false
    documented_in: ["CONTRIBUTING.md"]
    steps: ["doctor", "install-hooks", "check", "selftest"]

  ac_first:
    name: "Feature addition (AC-first)"
    description: "Add behavior via acceptance criterion, implement, validate"
    required: true
    documented_in: ["CONTRIBUTING.md", "CLAUDE.md"]
    steps: ["ac-new", "bundle", "bdd", "selftest"]

  design_decision:
    name: "Architecture decision (ADR-first)"
    description: "Record structural decisions in ADR, link to spec"
    required: true
    documented_in: ["CONTRIBUTING.md", "CLAUDE.md"]
    steps: ["adr-new", "adr-check"]

  dependency_change:
    name: "Dependency change (audit ritual)"
    description: "Update dependencies, validate security/license"
    required: true
    documented_in: ["CONTRIBUTING.md", "CLAUDE.md"]
    steps: ["audit"]

  release:
    name: "Release"
    description: "Bump version, validate, tag, push"
    required: true
    documented_in: ["CONTRIBUTING.md", "CLAUDE.md", "README.md"]
    steps: ["release-prepare", "release-verify"]

  ci_parity:
    name: "CI parity (run what CI runs)"
    description: "Local validation matching CI checks"
    required: false
    documented_in: ["README.md", "CLAUDE.md"]
    steps: ["ci-local", "fmt-all", "policy-test", "docs-check"]

  deployment:
    name: "Deployment"
    description: "Deploy services and run migrations"
    required: true
    documented_in: ["README.md"]
    steps: ["deploy", "migrate"]

  maintenance:
    name: "Maintenance"
    description: "Clean and maintain workspace"
    required: false
    documented_in: ["README.md"]
    steps: ["clean"]

  discovery:
    name: "Discovery"
    description: "Explore available commands and flows"
    required: true
    documented_in: ["README.md"]
    steps: ["help-flows", "ac-status", "tasks-list", "graph-export"]

  platform_exploration:
    name: "Platform Exploration"
    description: "Explore governance graph and task management"
    required: false
    documented_in: ["AGENT_GUIDE.md"]
    steps: ["status", "tasks-list", "graph-export", "suggest-next"]
