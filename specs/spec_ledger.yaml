stories:
  # Template Core - Keep and extend these in your service
  - id: US-TPL-001
    title: "Service Core Capabilities"
    requirements:
      - id: REQ-TPL-HEALTH
        title: "Health Check Endpoint"
        acceptance_criteria:
          - id: AC-TPL-001
            text: "GET /health returns 200 with status 'ok' when service is healthy"
            tests: [ { type: bdd, tag: "@AC-TPL-001" } ]
      - id: REQ-TPL-VERSION
        title: "Version Information Endpoint"
        acceptance_criteria:
          - id: AC-TPL-002
            text: "GET /version returns build information including version and git SHA"
            tests: [ { type: bdd, tag: "@AC-TPL-002" } ]
      - id: REQ-TPL-ERROR-HANDLING
        title: "Error Response Envelope"
        acceptance_criteria:
          - id: AC-TPL-003
            text: "All 4xx/5xx responses include an error code, message, and request ID"
            tests: [ { type: bdd, tag: "@AC-TPL-003" } ]
          - id: AC-TPL-004
            text: "Handlers propagate or generate X-Request-ID and expose it in responses"
            tests: [ { type: bdd, tag: "@AC-TPL-004" } ]

  # Example Feature - Adapt or replace with your domain
  - id: US-42
    title: "Customer Refund Management"
    requirements:
      - id: REQ-411
        title: "Refund Creation API"
        acceptance_criteria:
          - id: AC-123
            text: "Customer can create a refund for an order and receive a refund ID with pending status"
            tests: [ { type: bdd, tag: "@AC-123" } ]
