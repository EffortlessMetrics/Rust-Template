# Docs Index Specification
# Version: 1.0.0
# Purpose: Maps design/requirements/plan docs to stories/requirements/ACs/ADRs they cover
# This is the canonical registry for "serious" documentation with front-matter

schema_version: "1.0"
template_version: "v2.4.0"

docs:
  # Example design doc entry
  - id: DESIGN-TPL-HEALTH-001
    file: docs/design/health-endpoint.md
    doc_type: design_doc
    stories: ["US-TPL-001"]
    requirements: ["REQ-TPL-HEALTH"]
    acs: ["AC-TPL-001"]
    adrs: ["ADR-0001", "ADR-0003"]

  # Example implementation plan entry
  - id: PLAN-TPL-HEALTH-001
    file: docs/plans/health-endpoint-v1.md
    doc_type: impl_plan
    stories: ["US-TPL-001"]
    requirements: ["REQ-TPL-HEALTH"]
    acs: ["AC-TPL-001"]
    adrs: ["ADR-0001"]

  # Example requirements doc entry
  - id: REQS-TPL-CORE-001
    file: docs/requirements/service-core.md
    doc_type: requirements_doc
    stories: ["US-TPL-001"]
    requirements:
      - "REQ-TPL-HEALTH"
      - "REQ-TPL-VERSION"
      - "REQ-TPL-ERROR-HANDLING"
      - "REQ-TPL-METRICS"
    acs: []
    adrs: ["ADR-0001", "ADR-0003", "ADR-0005"]

  # Platform DevEx Design
  - id: DESIGN-PLT-001
    file: docs/design/platform-devex.md
    doc_type: design_doc
    stories: [US-TPL-PLT-001]
    requirements:
      - REQ-PLT-ONBOARDING
      - REQ-PLT-DESIGN-SCAFFOLDING
      - REQ-PLT-SECURITY-GOVERNANCE
      - REQ-PLT-DOCS-CONSISTENCY
      - REQ-PLT-RELEASE-SAFETY
      - REQ-PLT-DEVEX-CONTRACT
      - REQ-TPL-PLATFORM-INTROSPECTION
    adrs: [ADR-0002, ADR-0005, ADR-0006, ADR-0007]

  # Platform Introspection Design
  - id: DESIGN-TPL-PLATFORM-INTROSPECTION-001
    file: docs/design/platform-introspection.md
    title: "Platform Introspection API"
    doc_type: design_doc
    stories: [US-TPL-PLT-001]
    requirements:
      - REQ-TPL-PLATFORM-INTROSPECTION
      - REQ-TPL-PLATFORM-TASKS
      - REQ-TPL-GRAPH-VISUALIZATION
    acs: [AC-TPL-PLATFORM-GRAPH, AC-TPL-PLATFORM-DEVEX, AC-TPL-PLATFORM-DOCS]
    adrs: [ADR-0001]

  # Error Handling Design
  - id: DESIGN-TPL-ERRORS
    file: docs/design/error-handling.md
    doc_type: design_doc
    stories: [US-TPL-001]
    requirements: [REQ-TPL-ERROR-HANDLING]
    adrs: [ADR-0003]

  # Metrics Design
  - id: DESIGN-TPL-METRICS
    file: docs/design/metrics.md
    doc_type: design_doc
    stories: [US-TPL-001]
    requirements: [REQ-TPL-METRICS]
    adrs: [ADR-0003]

  # Version Endpoint Design
  - id: DESIGN-TPL-VERSION
    file: docs/design/version-endpoint.md
    doc_type: design_doc
    stories: [US-TPL-001]
    requirements: [REQ-TPL-VERSION]
    adrs: [ADR-0003]
