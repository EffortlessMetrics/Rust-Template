# Docs Index Specification
# Version: 1.0.0
# Purpose: Maps design/requirements/plan docs to stories/requirements/ACs/ADRs they cover
# This is the canonical registry for "serious" documentation with front-matter

schema_version: "1.0"
template_version: "v2.4.0"

docs:
  # Example design doc entry
  - id: DESIGN-TPL-HEALTH-001
    file: docs/design/health-endpoint.md
    doc_type: design_doc
    stories: ["US-TPL-001"]
    requirements: ["REQ-TPL-HEALTH"]
    acs: ["AC-TPL-001"]
    adrs: ["ADR-0001", "ADR-0003"]

  # Example implementation plan entry
  - id: PLAN-TPL-HEALTH-001
    file: docs/plans/health-endpoint-v1.md
    doc_type: impl_plan
    stories: ["US-TPL-001"]
    requirements: ["REQ-TPL-HEALTH"]
    acs: ["AC-TPL-001"]
    adrs: ["ADR-0001"]

  # Example requirements doc entry
  - id: REQS-TPL-CORE-001
    file: docs/requirements/service-core.md
    doc_type: requirements_doc
    stories: ["US-TPL-001"]
    requirements:
      - "REQ-TPL-HEALTH"
      - "REQ-TPL-VERSION"
      - "REQ-TPL-ERROR-HANDLING"
      - "REQ-TPL-METRICS"
    acs: []
    adrs: ["ADR-0001", "ADR-0003", "ADR-0005"]
