      - AC-TPL-VERSION-MANIFEST
    status: done
    owner: agent
    labels: [platform, versioning, release, v336, p0]
    summary: >
      Ensure REQ-TPL-VERSIONING-ENGINE and its ACs describe exactly what versioning.rs does.
      Verify AC IDs match implementation (AC-TPL-VERSION-MANIFEST, AC-TPL-VERSION-DRYRUN,
      AC-TPL-VERSION-ATOMIC). Confirm version_manifest.yaml covers all version-bearing files
      with simple, deterministic patterns.
    recommended_flows: ["ac_first"]
    depends_on:
      - TASK-VERS-ENGINE-003
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

  - id: TASK-VERS-TEST-001
    title: "Unit tests for versioning engine manifest + atomicity"
    requirement: REQ-TPL-VERSIONING-ENGINE
    acs:
      - AC-TPL-VERSION-MANIFEST
      - AC-TPL-VERSION-ATOMIC
    status: done
    owner: agent
    labels: [platform, versioning, testing, v336, p0]
    summary: >
      Add unit tests for VersionEngine using temp dirs with fixture files.
      Test cases: manifest load + plan + apply yields expected content; dry-run leaves files
      unchanged; atomic failure (injected error) leaves no partial state. Tag tests with ACs.
    recommended_flows: ["ac_first"]
    depends_on:
      - TASK-VERS-VALIDATE-001
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

  - id: TASK-VERS-INTEG-001
    title: "Integrate VersionEngine into release-prepare"
    requirement: REQ-TPL-VERSIONING-ENGINE
    acs:
      - AC-TPL-VERSION-MANIFEST
      - AC-TPL-VERSION-DRYRUN
      - AC-TPL-VERSION-ATOMIC
    status: done
    owner: agent
    labels: [platform, versioning, release, v336, p0]
    summary: >
      Replace manual file edits in release-prepare with VersionEngine calls:
      VersionInfo::from_args_and_spec_ledger, VersionEngine::plan_changes,
      VersionEngine::apply_changes. Add --dry-run support. docs-check version alignment
      should pass by only editing spec_ledger and running release-prepare.
    recommended_flows: ["ac_first"]
    depends_on:
      - TASK-VERS-TEST-001
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

