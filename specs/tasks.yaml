      Verify selftest green and feature_status shows versioning ACs as [PASS].
    recommended_flows: ["governed_release"]
    depends_on:
      - TASK-VERS-INTEG-001
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

