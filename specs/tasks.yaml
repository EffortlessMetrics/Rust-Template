  # Versioning Engine Track
  - id: TASK-VERS-ENGINE-001
    title: "Introduce versioning module in xtask"
    requirement: REQ-TPL-VERSIONING-ENGINE
    acs:
      - AC-TPL-VERSION-MODULE
    status: done
    owner: agent
    labels: [platform, versioning, release, p0]
    summary: >
      Create a dedicated versioning module in xtask that encapsulates all version
      manipulation logic. This provides a single source of truth for version parsing,
      validation, and updates across all release commands.
    recommended_flows: ["ac_first"]
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

  - id: TASK-VERS-ENGINE-002
    title: "Wire spec-ledger as single source of version"
    requirement: REQ-TPL-VERSIONING-ENGINE
    acs:
      - AC-TPL-VERSION-SOURCE
    status: done
    owner: agent
    labels: [platform, versioning, release, p0]
    summary: >
      Make specs/spec_ledger.yaml the canonical source of template version.
      All xtask commands (release-prepare, release-bundle, etc.) should read
      version from spec_ledger.yaml instead of hardcoded values or multiple sources.
    recommended_flows: ["ac_first"]
    depends_on:
      - TASK-VERS-ENGINE-001
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

  - id: TASK-VERS-ENGINE-003
    title: "Manifest-driven updates for all version-bearing files"
    requirement: REQ-TPL-VERSIONING-ENGINE
    acs:
      - AC-TPL-VERSION-MANIFEST
    status: done
    owner: agent
    labels: [platform, versioning, release, p0]
    summary: >
      Define a version manifest (YAML or embedded in spec_ledger) that lists all
      files requiring version updates (Cargo.toml, pyproject.toml, CLAUDE.md, etc.).
      The versioning engine reads this manifest and applies updates atomically.
    recommended_flows: ["ac_first"]
    depends_on:
      - TASK-VERS-ENGINE-002
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

  - id: TASK-VERS-ENGINE-004
    title: "Dry-run and atomicity for release-prepare"
    requirement: REQ-TPL-VERSIONING-ENGINE
    acs:
      - AC-TPL-VERSION-DRYRUN
      - AC-TPL-VERSION-ATOMIC
    status: done
    owner: agent
    labels: [platform, versioning, release, p0]
    summary: >
      Add --dry-run flag to release-prepare that shows what would be changed without
      writing files. Ensure all file updates are atomic (write to temp, then rename)
      to prevent partial state on errors.
    recommended_flows: ["ac_first"]
    depends_on:
      - TASK-VERS-ENGINE-003
    docs:
      design: [DESIGN-TPL-VERSIONING-ENGINE-001]
      plan: []

  # Versioning Engine Hardening (v3.3.6 prep)
  - id: TASK-VERS-VALIDATE-001
