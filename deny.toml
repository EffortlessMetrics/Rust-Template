[advisories]
yanked = "deny"
# See ADR-0007 for dependency security policy.
#
# RUSTSEC-2025-0057 (fxhash unmaintained):
#   - Transitive: selectors → scraper → app-http (dev-only)
#   - Not a security vulnerability, just unmaintained
#   - Upstream issue: https://github.com/servo/selectors/issues
#   - We use the latest scraper/selectors versions
#
# RUSTSEC-2025-0134 (rustls-pemfile unmaintained):
#   - Transitive: bollard → testcontainers → adapters-db-sqlx (dev-only)
#   - Not a security vulnerability, just unmaintained (archived)
#   - Upstream issue: https://github.com/testcontainers/testcontainers-rs/issues
#   - We use the latest testcontainers version
#
ignore = [
    "RUSTSEC-2025-0057",  # fxhash - dev-only, awaiting selectors fix
    "RUSTSEC-2025-0134",  # rustls-pemfile - dev-only, awaiting bollard fix
]

[licenses]
# Standard permissive licenses plus commonly-used compatible licenses
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",          # Unicode License v3 (icu_* crates)
    "MPL-2.0",              # Mozilla Public License (colored crate)
    "Zlib",                 # zlib License (foldhash crate)
    "ISC",                  # ISC License (common in crypto crates)
    "CC0-1.0",              # Public domain dedication
    "BlueOak-1.0.0",        # Blue Oak Model License (synthez/cucumber)
    "CDLA-Permissive-2.0",  # Community Data License Agreement (webpki-roots)
]
# Ignore unlicensed workspace/path crates (they are marked publish = false)
private = { ignore = true }

[bans]
multiple-versions = "warn"
# Allow wildcard deps for path dependencies (workspace crates)
wildcards = "allow"
