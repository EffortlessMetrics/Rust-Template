repos:
  - repo: local
    hooks:
      - id: skills-fmt
        name: Format Agent Skills
        entry: python3 scripts/skills_fmt.py
        language: system
        pass_filenames: false
        files: ^\.claude/skills/.*/SKILL\.md$

      - id: skills-lint
        name: Lint Agent Skills
        entry: python3 scripts/skills_lint.py
        language: system
        pass_filenames: false
        files: ^\.claude/skills/.*/SKILL\.md$
