# Pre-commit configuration for Rust-Template
#
# INSTALLATION:
#   1. Install pre-commit: pip install pre-commit
#   2. Install hooks: pre-commit install
#   3. Run hooks on all files: pre-commit run --all-files
#
# To update hooks: pre-commit autoupdate
# To skip hooks on a commit: git commit --no-verify
#
# For more information: https://pre-commit.com

# Minimum version of pre-commit required
minimum_pre_commit_version: "3.0.0"

# Default language version for Python hooks
default_language_version:
  python: python3

# Fail fast - stop on first failure
fail_fast: false

# CI configuration - pre-commit.ci will auto-fix when possible
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false

repos:
  # ============================================
  # Rust-specific hooks
  # ============================================
  - repo: local
    hooks:
      # Rust formatting with rustfmt
      - id: rustfmt
        name: rustfmt
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
        description: Format Rust code with rustfmt
        args: ['--', '--check']

      # Rust linting with clippy (fast mode)
      - id: clippy
        name: clippy
        entry: cargo clippy
        language: system
        types: [rust]
        pass_filenames: false
        description: Lint Rust code with clippy
        args: ['--all-targets', '--all-features', '--', '-D', 'warnings']

  # ============================================
  # YAML linting
  # ============================================
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: yamllint
        description: Lint YAML files
        types: [yaml]
        args: ['--strict', '-c', '.yamllint']

  # ============================================
  # Markdown linting
  # ============================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        name: markdownlint
        description: Lint Markdown files
        types: [markdown]
        args: ['--fix']
        exclude: ^(CHANGELOG\.md)$  # Exclude changelog from strict linting

  # ============================================
  # Shell script linting
  # ============================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Lint shell scripts
        types: [shell]
        args: ['--severity=warning']

  # ============================================
  # General file checks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Check for large files (>5MB)
      - id: check-added-large-files
        name: check-added-large-files
        description: Prevent large files from being committed
        args: ['--maxkb=5120']

      # Check for merge conflicts
      - id: check-merge-conflict
        name: check-merge-conflict
        description: Check for merge conflict markers

      # Check for broken symlinks
      - id: check-symlinks
        name: check-symlinks
        description: Check for broken symlinks

      # Check for case conflicts
      - id: check-case-conflict
        name: check-case-conflict
        description: Check for case conflicts on case-insensitive filesystems

      # Check for executables with shebang
      - id: check-executables-have-shebangs
        name: check-executables-have-shebangs
        description: Check that executable files have shebangs

      # Check that non-executable files don't have shebangs
      - id: check-shebang-scripts-are-executable
        name: check-shebang-scripts-are-executable
        description: Check that scripts with shebangs are executable
        exclude: \.rs$

      # Check JSON files
      - id: check-json
        name: check-json
        description: Check JSON files are valid
        types: [json]
        exclude: ^\.vscode/.*\.json$

      # Check TOML files
      - id: check-toml
        name: check-toml
        description: Check TOML files are valid
        types: [toml]

      # Check YAML files
      - id: check-yaml
        name: check-yaml
        description: Check YAML files are valid
        types: [yaml]
        args: ['--allow-multiple-documents']

      # Detect private keys
      - id: detect-private-key
        name: detect-private-key
        description: Detect private keys in committed files

      # End of file fixer - ensure single newline at end
      - id: end-of-file-fixer
        name: end-of-file-fixer
        description: Ensure files end with a newline
        exclude: ^(CHANGELOG\.md)$

      # Fix trailing whitespace
      - id: trailing-whitespace
        name: trailing-whitespace
        description: Trim trailing whitespace
        exclude: ^(CHANGELOG\.md)$

      # Mixed line ending fixer
      - id: mixed-line-ending
        name: mixed-line-ending
        description: Fix mixed line endings (LF)
        args: ['--fix=lf']

      # Sort requirements.txt files
      - id: sort-simple-yaml
        name: sort-simple-yaml
        description: Sort simple YAML files
        files: ^(forks/fork_registry\.yaml)$

  # ============================================
  # Security checks
  # ============================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets
        description: Detect secrets in committed files
        args: ['--baseline', '.secrets.baseline']
        exclude: ^(package-lock\.json|yarn\.lock|pnpm-lock\.yaml)$

  # ============================================
  # File content checks
  # ============================================
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      # Check for forbidden licenses
      - id: forbid-crlf
        name: forbid-crlf
        description: Ensure files use LF line endings

      # Check for tabs
      - id: forbid-tabs
        name: forbid-tabs
        description: Ensure files use spaces instead of tabs
        exclude: ^(Makefile|justfile|\.gitmodules)$

  # ============================================
  # TOML linting
  # ============================================
  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.2
    hooks:
      - id: toml-sort
        name: toml-sort
        description: Sort and format TOML files
        types: [toml]
        args: ['--all', '--in-place']
        exclude: ^(Cargo\.lock)$

  # ============================================
  # Documentation checks
  # ============================================
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.12.2
    hooks:
      - id: markdown-link-check
        name: markdown-link-check
        description: Check Markdown links are valid
        types: [markdown]
        files: ^(README\.md|QUICKSTART\.md|CONTRIBUTING\.md|docs/INDEX\.md|docs/QUICKSTART\.md|docs/AGENT_GUIDE\.md)$
        args: ['--config', '.markdown-link-check.json']
