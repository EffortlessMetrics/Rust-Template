repos:
  - repo: local
    hooks:
      - id: skills-fmt
        name: Format Agent Skills
        entry: cargo run -p xtask -- skills-fmt
        language: system
        pass_filenames: false
        files: ^\.claude/skills/.*/SKILL\.md$

      - id: skills-lint
        name: Lint Agent Skills
        entry: cargo run -p xtask -- skills-lint
        language: system
        pass_filenames: false
        files: ^\.claude/skills/.*/SKILL\.md$
