tasks:
  implement_ac:
    max_bytes: 250000
    include:
      - specs/spec_ledger.yaml
      - specs/userstories/**/*.md
      - specs/features/**/*.feature
      - features/*.yaml
      - flags/*.yaml
      - crates/core/src/**/*.rs
      - crates/acceptance/src/**/*.rs
      - crates/acceptance/tests/**/*.rs
    description: "Context for implementing an AC: ledger, specs, features, and core code"

  implement_feature:
    max_bytes: 300000
    include:
      - specs/spec_ledger.yaml
      - specs/userstories/**/*.md
      - specs/openapi/**/*.yaml
      - specs/proto/**/*.proto
      - features/*.yaml
      - flags/*.yaml
      - crates/**/src/**/*.rs
    description: "Broader context for feature development: all specs and application code"

  debug_tests:
    max_bytes: 200000
    include:
      - specs/features/**/*.feature
      - crates/acceptance/**/*.rs
      - crates/*/tests/**/*.rs
      - crates/*/src/**/*.rs
    description: "Context for debugging tests: test code, step definitions, and application code"
