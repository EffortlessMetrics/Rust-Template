# Advanced: Bundle with optional prompt guidance (for future use)
#
# You can add a 'prompt' field to provide LLM context automatically:
#
# tasks:
#   implement_ac:
#     max_bytes: 250000
#     include: [...]
#     description: "..."
#     # Optional: Prepend this to every bundle generation
#     # prompt: |
#     #   You are implementing acceptance criteria in a governed codebase.
#     #   - All AC IDs must exist in specs/spec_ledger.yaml
#     #   - Follow existing patterns from the bundle
#     #   - Do NOT invent new AC IDs
#     #   - Add @AC-XXX tags to Gherkin scenarios
#
# Note: 'prompt' field is not currently used by xtask but could be
# integrated in future tooling for automatic prompt generation.

# Tips for Creating Custom Bundles:
#
# 1. Start specific, expand if needed
#    Bad:  crates/**/*.rs (too broad, hits max_bytes)
#    Good: crates/core/src/**/*.rs (focused)
#
# 2. Include examples for pattern-matching
#    Always include existing code that shows "how we do things"
#
# 3. Use .llm/.llmignore to exclude files
#    See docs/how-to/use-llm-bundles.md#excluding-files
#
# 4. Test your bundle size
#    cargo run -p xtask -- bundle your_task | wc -c
#
# 5. Verify required tasks exist
#    cargo run -p xtask -- policy-test
#    (Checks for 'implement_ac' and 'selftest')

# Governance Note:
#
# This file is validated by policy/llm.rego which enforces:
# - Required tasks exist (implement_ac, selftest)
# - Tasks have required fields (max_bytes, include, description)
# - Field types are correct (max_bytes > 0, include is array of strings)
# - No unknown fields
#
# Run `cargo run -p xtask -- policy-test` to validate changes.
