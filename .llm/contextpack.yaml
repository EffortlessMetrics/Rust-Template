# LLM Context Pack Configuration
#
# Template Version: v3.0.0
# Schema Version: 1.0
# Last Updated: 2025-11-22
#
# This file defines context bundles for LLM-native development.
# Each bundle packages relevant files into markdown for AI code generation.
#
# See: docs/how-to/use-llm-bundles.md for usage guide
# See: CLAUDE.md for standard prompts and workflow
#
# Validation: `cargo run -p xtask -- policy-test`
# Policy: policy/llm.rego enforces structure

# Bundle Sizing Guidance:
#
# - Small (100-150KB): Focused tasks, single module
# - Medium (200-250KB): AC implementation, debugging
# - Large (300KB+): Feature development, refactoring
#
# Limits prevent LLM context overflow. If bundle is too small,
# add more include patterns. If too large, split into subtasks.

tasks:
  # Bundle: implement_ac
  # Use for: Implementing a single acceptance criterion
  # Size: 250KB - Fits ledger, BDD features, core logic
  #
  # Example usage:
  #   cargo run -p xtask -- bundle implement_ac > /tmp/context.md
  #
  # Contains:
  #   - Acceptance criteria from ledger (source of truth)
  #   - Gherkin scenarios (test examples to pattern-match)
  #   - Core business logic (implementation patterns)
  #   - Acceptance test steps (test patterns)
  #
  # Typical prompts:
  #   "Implement AC-TPL-005 using patterns from this bundle..."
  #   "Add BDD scenario for AC-XYZ following existing style..."
  implement_ac:
    description: "Context for implementing a single acceptance criterion end-to-end."
    prompt: |
      You are working on a governed Rust service template. Use this bundle to:
      - Understand the relevant AC in specs/spec_ledger.yaml
      - Find the corresponding BDD scenario in specs/features
      - Locate the core and app-http code that needs to change
      - Make minimal, safe edits that keep selftest passing

      Guidelines:
      - DO NOT invent new AC IDs; they must exist in spec_ledger.yaml
      - Follow existing patterns from the bundled code
      - Tag BDD scenarios with @AC-XXX-YYY
      - Run `cargo run -p xtask -- selftest` after changes
    max_bytes: 250000
    include:
      - specs/spec_ledger.yaml       # Source of truth for ACs
      - specs/userstories/**/*.md    # User story context
      - specs/features/**/*.feature  # BDD scenarios (examples)
      - features/*.yaml              # Feature toggle config
      - flags/*.yaml                 # Feature flag definitions
      - crates/business-core/**/*.rs # Core business logic patterns
      - crates/app-http/**/*.rs      # HTTP adapter patterns
      - crates/acceptance/src/**/*.rs # Step definition patterns
      - crates/acceptance/tests/**/*.rs
      - docs/tutorials/day-7-first-real-feature.md # Tutorial for reference

  # Bundle: implement_feature
  # Use for: Multi-AC feature development, endpoint additions
  # Size: 300KB - Broader scope than implement_ac
  #
  # Example usage:
  #   cargo run -p xtask -- bundle implement_feature > /tmp/context.md
  #
  # Contains:
  #   - All specs (OpenAPI, protobuf, ledger)
  #   - All application code (handlers, models, core)
  #   - Feature flags and toggles
  #
  # Typical prompts:
  #   "Add GET /api/metrics endpoint with AC-TPL-006..."
  #   "Implement notification feature with ACs XYZ-001 through XYZ-003..."
  implement_feature:
    max_bytes: 300000
    include:
      - specs/spec_ledger.yaml       # ACs and requirements
      - specs/userstories/**/*.md    # User stories
      - specs/openapi/**/*.yaml      # API contracts
      - specs/proto/**/*.proto       # gRPC contracts
      - features/*.yaml              # Feature definitions
      - flags/*.yaml                 # Flag registry
      - crates/**/src/**/*.rs        # All application code
    description: "Broader context for feature development: all specs and application code"

  # Bundle: debug_tests
  # Use for: Debugging failing BDD scenarios or tests
  # Size: 200KB - Focused on test code and implementations
  #
  # Example usage:
  #   cargo run -p xtask -- bundle debug_tests > /tmp/context.md
  #
  # Contains:
  #   - Gherkin scenarios (what's being tested)
  #   - Step definitions (test implementation)
  #   - Application code (actual behavior)
  #
  # Typical prompts:
  #   "Scenario @AC-TPL-002 fails with error: [paste error]..."
  #   "Why is this BDD test expecting X but getting Y?"
  debug_tests:
    max_bytes: 200000
    include:
      - specs/features/**/*.feature  # Gherkin scenarios
      - crates/acceptance/**/*.rs    # Cucumber step definitions
      - crates/*/tests/**/*.rs       # Unit/integration tests
      - crates/*/src/**/*.rs         # Application code
    description: "Context for debugging tests: test code, step definitions, and application code"

  # Bundle: selftest (Required by policy/llm.rego)
  # Use for: Understanding overall project health
  # Size: 250KB - All governance and test artifacts
  #
  # This bundle is REQUIRED by policy/llm.rego.
  # It provides context for understanding project compliance.
  selftest:
    max_bytes: 250000
    include:
      - specs/spec_ledger.yaml       # All ACs
      - specs/features/**/*.feature  # All BDD scenarios
      - policy/**/*.rego             # Policy rules
      - .llm/contextpack.yaml        # This file
    description: "Project health and governance context"

  # Bundle: _test_bundle_invalid_refs (BDD test fixture)
  # DO NOT REMOVE: This task is used by @AC-TPL-BUNDLE-REFERENTIAL-INTEGRITY tests
  # to verify that bundle generation warns on invalid AC references.
  _test_bundle_invalid_refs:
    max_bytes: 50000
    include:
      - README.md
    description: "BDD test fixture for bundle referential integrity validation"

# Example: Custom bundle for specific use cases
#
# Uncomment and customize for your needs:
#
