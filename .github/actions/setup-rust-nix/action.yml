name: 'Setup Rust with Nix and caching'
description: 'Sets up Nix development environment with Rust, rust-cache, and sccache'
inputs:
  enable-sccache:
    description: 'Enable sccache for compilation caching'
    required: false
    default: 'true'
  enable-rust-cache:
    description: 'Enable rust-cache for dependency caching'
    required: false
    default: 'true'
  nix-installer:
    description: 'Nix installer action to use'
    required: false
    default: 'cachix'
outputs:
  cache-hit:
    description: 'Whether rust-cache had a cache hit'
    value: ${{ steps.rust-cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Rust cache
      if: inputs.enable-rust-cache == 'true'
      id: rust-cache
      uses: Swatinem/rust-cache@v2

    - name: Install Nix (cachix)
      if: inputs.nix-installer == 'cachix'
      uses: cachix/install-nix-action@v27

    - name: Install Nix (determinate)
      if: inputs.nix-installer == 'determinate'
      uses: DeterminateSystems/nix-installer-action@v9

    - name: Configure Nix cache
      if: inputs.nix-installer == 'determinate'
      uses: DeterminateSystems/magic-nix-cache-action@v2

    - name: Enable sccache
      if: inputs.enable-sccache == 'true'
      shell: bash
      run: |
        # Try to get sccache path from nix develop, filtering out devshell welcome message
        # Allow failure since sccache is optional optimization
        set +e
        SCCACHE_OUTPUT=$(nix develop -c which sccache 2>&1)
        SCCACHE_EXIT=$?
        set -e

        if [ $SCCACHE_EXIT -eq 0 ]; then
          SCCACHE_PATH=$(echo "$SCCACHE_OUTPUT" | grep -v "DevShell ready" | grep -v "^$" | tail -1)
          if [ -n "$SCCACHE_PATH" ] && [ -f "$SCCACHE_PATH" ]; then
            echo "Found sccache at: $SCCACHE_PATH"
            echo "RUSTC_WRAPPER=$SCCACHE_PATH" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=1" >> $GITHUB_ENV
            echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
            nix develop -c sccache --start-server || true
          else
            echo "Warning: sccache path invalid or not found, skipping"
          fi
        else
          echo "Warning: nix develop failed (exit $SCCACHE_EXIT), skipping sccache setup"
          echo "Output was: $SCCACHE_OUTPUT"
        fi

    - name: Show sccache stats (pre-build)
      if: inputs.enable-sccache == 'true'
      shell: bash
      run: nix develop -c sccache --show-stats || true
