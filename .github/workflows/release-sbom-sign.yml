name: Release
on:
  push: { tags: ["v*"] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install cyclonedx-bom
        run: cargo install cyclonedx-bom --locked
      - name: Generate SBOM
        run: cyclonedx-bom -o sbom.json
      # TODO: Implement release notes generation from git tags/commits
      # Consider using: git-cliff, conventional commits, or GitHub release notes API
      - name: Generate release notes (placeholder)
        run: echo "Release notes generation - implement based on your changelog workflow"
