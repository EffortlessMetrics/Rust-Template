name: Release
on:
  push: { tags: ["v*"] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install cargo-cyclonedx
        # Note: cyclonedx-bom is a library; cargo-cyclonedx is the CLI tool
        run: cargo install cargo-cyclonedx --locked
      - name: Print cargo-cyclonedx version
        run: cargo cyclonedx --version
      - name: Generate SBOM (JSON)
        run: |
          cargo cyclonedx -f json --manifest-path Cargo.toml --override-filename sbom
          test -s sbom.json && echo "✓ Generated sbom.json ($(wc -c < sbom.json) bytes)"
      # TODO: Implement release notes generation from git tags/commits
      # Consider using: git-cliff, conventional commits, or GitHub release notes API
      - name: Generate release notes (placeholder)
        run: echo "Release notes generation - implement based on your changelog workflow"
