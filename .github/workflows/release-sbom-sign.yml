name: Release
on:
  push: { tags: ["v*"] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - run: cargo install cyclonedx-bom --locked || true
      - run: cyclonedx-bom -o sbom.json
      - name: Generate release notes (features advanced)
        run: bash scripts/gen-release-notes.sh
