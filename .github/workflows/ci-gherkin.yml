name: Gherkin
on:
  pull_request:
    paths:
      - 'specs/features/**'
      - 'specs/spec_ledger.yaml'
      - '.github/workflows/ci-gherkin.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - name: Gherkin Lint (pinned)
        env: { GHERKIN_LINT_VERSION: "9.0.0" }
        run: |
          nix develop -c npx -y "gherkin-lint@${GHERKIN_LINT_VERSION:-latest}" -c .gherkin-lintrc specs/features
      - name: Require exactly one @AC-#### tag per Scenario
        run: |
          python3 - <<'PY'
          import re, sys, pathlib
          ok=True
          for f in pathlib.Path("specs/features").rglob("*.feature"):
              lines=f.read_text().splitlines()
              for i,l in enumerate(lines):
                  if re.match(r'^\s*Scenario(?: Outline)?:', l):
                      j=i-1; acs=[]
                      while j>=0 and lines[j].lstrip().startswith("@"):
                          acs += re.findall(r'@AC-\d+', lines[j])
                          j-=1
                      if len(acs) != 1:
                          print(f"{f}: Scenario at line {i+1} must have exactly one @AC-#### tag (found {len(acs)}: {acs})")
                          ok=False
          sys.exit(0 if ok else 1)
          PY
