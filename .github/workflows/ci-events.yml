
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: EventSchemas
on:
  pull_request:
    paths: ['specs/events/**', '.github/workflows/ci-events.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sr-compat:
    if: ${{ secrets.SR_URL != '' && secrets.SR_AUTH != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: { contents: read }
    env:
      ENFORCE_CHECKSUMS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .tools/bin
          key: tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bootstrap-tools.sh') }}
      - uses: cachix/install-nix-action@v31
      - run: nix develop -c ./bootstrap-tools.sh

      - run: nix develop -c ./scripts/check-schema-compat.sh
        env:
          SCHEMA_REGISTRY_URL: ${{ secrets.SR_URL }}
          SCHEMA_REGISTRY_AUTH: ${{ secrets.SR_AUTH }}
