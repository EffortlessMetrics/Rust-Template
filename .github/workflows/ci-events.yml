name: EventSchemas
on:
  pull_request:
    paths: ['specs/events/**', '.github/workflows/ci-events.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sr-compat:
    if: ${{ secrets.SR_URL != '' && secrets.SR_AUTH != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: { contents: read }
    env:
      ENFORCE_CHECKSUMS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .tools/bin
          key: tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bootstrap-tools.sh') }}
      - uses: cachix/install-nix-action@v27
      - run: nix develop -c ./bootstrap-tools.sh

      # TODO: Implement schema compatibility checking with Schema Registry
      # Example: curl -X POST $SR_URL/compatibility/subjects/orders-value/versions/latest \
      #   -H "Content-Type: application/vnd.schemaregistry.v1+json" \
      #   -d @specs/events/json-schema/orders.json
      - run: echo "Schema compatibility check - implement based on your Schema Registry setup"
        env:
          SCHEMA_REGISTRY_URL: ${{ secrets.SR_URL }}
          SCHEMA_REGISTRY_AUTH: ${{ secrets.SR_AUTH }}
