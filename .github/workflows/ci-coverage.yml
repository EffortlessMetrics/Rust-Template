name: Coverage
on:
  pull_request:
    paths:
      - 'crates/**'
      - 'tests/**'
      - 'specs/**'
      - 'features/**'
      - '.github/workflows/ci-coverage.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust + Nix environment
        uses: ./.github/actions/setup-rust-nix

      # Build xtask to target/debug/ first - required by acceptance tests
      # (llvm-cov uses target/llvm-cov-target/ which won't have the binary)
      - name: Pre-build xtask for acceptance tests
        run: nix develop -c cargo build -p xtask

      - name: Run coverage (JSON)
        env: { RUSTC_WRAPPER: "", CARGO_INCREMENTAL: "0" }
        run: nix develop -c cargo llvm-cov --workspace --json --output-path cov.json

      - name: Enforce floor (60%)
        run: |
          nix develop -c bash -c '
            PCT=$(jq ".totals.lines.percent|floor" cov.json)
            echo "coverage=${PCT}%"
            test "${PCT}" -ge 60
          '

      - name: Show sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: cov.json
          if-no-files-found: error
