
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Coverage
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust + Nix environment
        uses: ./.github/actions/setup-rust-nix

      # Build xtask to target/debug/ first - required by acceptance tests
      # (llvm-cov uses target/llvm-cov-target/ which won't have the binary)
      - name: Pre-build xtask for acceptance tests
        run: nix develop -c cargo build -p xtask

      - name: Run coverage (report only - release receipt)
        env: { CARGO_INCREMENTAL: "0" }
        run: |
          nix develop -c env -u RUSTC_WRAPPER -u SCCACHE_GHA_ENABLED cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
          nix develop -c env -u RUSTC_WRAPPER -u SCCACHE_GHA_ENABLED cargo llvm-cov --workspace --all-features --json --output-path cov.json
      - name: Run selftest with coverage report
        run: |
          nix develop -c bash -lc 'XTASK_COVERAGE_REPORT=cov.json cargo xtask selftest'

      - name: Show sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: cov.json
          if-no-files-found: error
