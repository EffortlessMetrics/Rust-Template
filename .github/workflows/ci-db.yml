name: DB
on:
  pull_request:
    paths: ['specs/db/**', '.github/workflows/ci-db.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  atlas:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: { contents: read }
    env:
      ENFORCE_CHECKSUMS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .tools/bin
          key: tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bootstrap-tools.sh') }}
      - uses: cachix/install-nix-action@v31
      - run: nix develop -c ./bootstrap-tools.sh

      - name: atlas schema diff (advisory)
        run: nix develop -c ./.tools/bin/atlas schema diff --dev-url "sqlite://file?mode=memory&_fk=1" --from file://specs/db/atlas/migrations --to file://specs/db/atlas/schema.hcl
        continue-on-error: true  # Advisory until schema names aligned (sqlite "main" vs HCL "public")

      - name: atlas migrate lint (advisory, Pro-only)
        run: |
          nix develop -c ./.tools/bin/atlas migrate lint \
            --dir file://specs/db/atlas/migrations \
            --dev-url "sqlite://file?mode=memory&_fk=1" \
          || echo "::warning::atlas migrate lint failed (likely requires Atlas Pro in v0.38+). Skipping enforcement in CI template."
