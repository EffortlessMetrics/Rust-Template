name: Example Fork Validation
# PRs touching example paths: run structure validation only (fast, no BDD)
# Tags: run full selftest to ensure release quality
# Nightly/manual: governance checks only
on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "examples/fork-customization/**"
      - ".github/workflows/ci-example-fork.yml"
  schedule:
    # Nightly at 7 AM UTC (offset from selftest.yml)
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  example-fork:
    runs-on: ubuntu-latest
    name: Example Fork (Linux + Nix)
    timeout-minutes: 60
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Validate example fork structure (runs on all events - fast, no deps)
      - name: Validate example fork structure
        run: |
          echo "✓ Example fork directory exists: examples/fork-customization/"
          ls -la examples/fork-customization/

          echo "✓ Checking sample files..."
          test -f examples/fork-customization/README.md || { echo "Missing README.md"; exit 1; }
          test -f examples/fork-customization/sample-spec-additions.yaml || { echo "Missing sample-spec-additions.yaml"; exit 1; }
          test -f examples/fork-customization/sample-service-metadata.yaml || { echo "Missing sample-service-metadata.yaml"; exit 1; }
          test -f examples/fork-customization/sample-product-catalog.feature || { echo "Missing sample-product-catalog.feature"; exit 1; }
          echo "✓ All sample files present"

      # PRs: structure validation only (above step) - skip Rust/Nix setup
      # Tags + nightly/manual: need full environment for selftest/check
      - uses: Swatinem/rust-cache@v2
        if: github.event_name != 'pull_request'
        with:
          shared-key: rust-${{ runner.os }}
          cache-on-failure: true

      - uses: cachix/install-nix-action@v31
        if: github.event_name != 'pull_request'

      - name: Enable sccache
        if: github.event_name != 'pull_request'
        run: |
          if nix develop -c sh -c 'command -v sccache >/dev/null 2>&1'; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=1" >> $GITHUB_ENV
            echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
            nix develop -c sccache --start-server || true
          else
            echo "Warning: sccache not found in nix devshell, skipping"
          fi

      # On tags (releases): run full selftest to ensure release quality
      - name: Run full selftest (release tags)
        if: startsWith(github.ref, 'refs/tags/')
        run: nix develop -c cargo run -p xtask -- selftest

      # On nightly/manual: run check only (fast validation, tier1-selftest owns BDD)
      - name: Run governance checks (nightly/manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          echo "📋 Running fast governance checks (nightly mode)"
          nix develop -c cargo run -p xtask -- check

      - name: Test result
        if: success()
        run: |
          echo "✓ Example fork validation passed"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "✓ Structure validation passed (PR fast path)"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "✓ Template selftest passed (confirms fork infrastructure is sound)"
          else
            echo "✓ Governance checks passed (nightly validation)"
          fi
