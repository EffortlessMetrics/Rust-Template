name: Agents Governance Lint

on:
  pull_request:
    paths:
      - '.claude/agents/**'
      - 'docs/AGENTS_*.md'
      - 'docs/adr/0021-*.md'
      - 'specs/spec_ledger.yaml'
      - 'crates/xtask/src/commands/agents.rs'
      - 'crates/xtask/src/main.rs'

jobs:
  agents-lint:
    runs-on: ubuntu-latest
    name: Lint Agents Governance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build xtask
        run: cargo build -p xtask --release
        env:
          CARGO_PROFILE_RELEASE_LTO: true
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

      - name: Run agents-lint
        run: cargo run --release -p xtask -- agents-lint

      - name: Comment on PR if agents-lint passes
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Agents Governance Check Passed**\n\nAll agents in `.claude/agents/` pass validation. See [AGENTS_GOVERNANCE.md](docs/AGENTS_GOVERNANCE.md) for details.'
            })

      - name: Comment on PR if agents-lint fails
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Agents Governance Check Failed**\n\nFix the errors reported above. See [AGENTS_GOVERNANCE.md](docs/AGENTS_GOVERNANCE.md) for troubleshooting.'
            })
