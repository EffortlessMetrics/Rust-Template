
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Agents Governance Lint

on:
  pull_request:
    paths:
      - '.claude/agents/**'
      - 'docs/AGENTS_*.md'
      - 'docs/adr/0021-*.md'
      - 'specs/spec_ledger.yaml'
      - 'crates/xtask/src/commands/agents.rs'
      - 'crates/xtask/src/main.rs'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agents-lint:
    runs-on: ubuntu-latest
    name: Lint Agents Governance
    timeout-minutes: 10
    permissions: { contents: read, pull-requests: write }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust + Nix environment
        uses: ./.github/actions/setup-rust-nix

      - name: Run agents-lint
        run: nix develop -c cargo run -p xtask -- agents-lint

      - name: Show sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats

      - name: Comment on PR if agents-lint passes
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Agents Governance Check Passed**\n\nAll agents in `.claude/agents/` pass validation. See [AGENTS_GOVERNANCE.md](docs/AGENTS_GOVERNANCE.md) for details.'
            })

      - name: Comment on PR if agents-lint fails
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Agents Governance Check Failed**\n\nFix the errors reported above. See [AGENTS_GOVERNANCE.md](docs/AGENTS_GOVERNANCE.md) for troubleshooting.'
            })
