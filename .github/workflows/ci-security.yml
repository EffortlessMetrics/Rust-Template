name: Security
on:
  pull_request:
    paths-ignore: ['**/*.md','docs/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    # Skip for forks (limited token access)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: { actions: read, contents: read, security-events: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: github/codeql-action/init@v3
        with: { languages: rust }
      - uses: github/codeql-action/analyze@v3
  secrets:
    # Skip for forks (org secrets not available) and repos without GITLEAKS_LICENSE
    # NOTE: gitleaks-action v2 now requires a paid license. Skip if not configured.
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # Use gitleaks directly (free) instead of gitleaks-action (requires license)
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          chmod +x gitleaks
      - name: Run gitleaks
        run: ./gitleaks detect --source . --verbose --redact
  deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      # Install audit tools INSIDE nix develop (uses correct Rust for Cargo.lock v4 + edition 2024)
      - name: Install audit tooling and run audit
        run: |
          nix develop -c bash -c '
            cargo install cargo-audit --locked
            cargo install cargo-deny --locked
            export PATH="$HOME/.cargo/bin:$PATH"
            cargo xtask audit
          '
