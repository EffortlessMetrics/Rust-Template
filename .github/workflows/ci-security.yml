name: Security
on:
  pull_request:
    paths-ignore: ['**/*.md','docs/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  codeql:
    # Skip for forks (limited token access)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: { actions: read, contents: read, security-events: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: github/codeql-action/init@v3
        with: { languages: rust }
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true  # Don't fail CI for repos without Code Scanning enabled
  secrets:
    # Skip for forks (org secrets not available) and repos without GITLEAKS_LICENSE
    # NOTE: gitleaks-action v2 now requires a paid license. Skip if not configured.
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    env:
      # Tool version sourced from .github/workflows/tool-versions.yml
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # Use gitleaks directly (free) instead of gitleaks-action (requires license)
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz | tar xz
          chmod +x gitleaks
      - name: Run gitleaks
        run: ./gitleaks detect --source . --verbose --redact --config .gitleaks.toml
  deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      # Install audit tools INSIDE nix develop (uses correct Rust for Cargo.lock v4 + edition 2024)
      - name: Install audit tooling and run audit
        run: |
          nix develop -c bash -c '
            cargo install cargo-audit --locked
            cargo install cargo-deny --locked
            export PATH="$HOME/.cargo/bin:$PATH"
            cargo xtask audit
          '
  tool-checksums:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - name: Check tools.sha256 exists and is not empty
        run: |
          if [ ! -f "scripts/tools.sha256" ]; then
            echo "🚨 SECURITY ERROR: scripts/tools.sha256 does not exist"
            echo "   Action required: Run 'cargo xtask tools-checksum-update' to create it"
            exit 1
          fi

          if [ ! -s "scripts/tools.sha256" ]; then
            echo "🚨 SECURITY ERROR: scripts/tools.sha256 is empty"
            echo "   Action required: Run 'cargo xtask tools-checksum-update' to populate it"
            exit 1
          fi

          # Count actual checksum entries (non-comment, non-empty)
          checksum_entries=$(grep -c '^[a-zA-Z0-9-]*-[0-9a-zA-Z.-]* [a-f0-9]\{64\}$' scripts/tools.sha256 || echo "0")
          echo "Found $checksum_entries checksum entries"

          if [ "$checksum_entries" -lt 12 ]; then
            echo "🚨 SECURITY ERROR: scripts/tools.sha256 has insufficient checksum entries"
            echo "   Expected at least 12 entries (3 tools × 4 platforms minimum)"
            echo "   Action required: Run 'cargo xtask tools-checksum-update' to update it"
            exit 1
          fi

          echo "✓ Checksum file validation passed"
      - name: Validate checksum format
        run: |
          # Check that all required tools have checksum entries
          required_tools=("oasdiff" "buf" "atlas")
          for tool in "${required_tools[@]}"; do
            if ! grep -q "^$tool-[0-9a-zA-Z.-]* [a-f0-9]\{64\}$" scripts/tools.sha256; then
              echo "🚨 SECURITY ERROR: Missing checksum entries for $tool"
              echo "   Action required: Run 'cargo xtask tools-checksum-update' to add missing entries"
              exit 1
            fi
          done

          echo "✓ Checksum format validation passed"
      - name: Test checksum enforcement
        run: |
          # Test that bootstrap script enforces checksums when ENFORCE_CHECKSUMS=1
          if ! ENFORCE_CHECKSUMS=1 ./bootstrap-tools.sh 2>/dev/null; then
            echo "🚨 SECURITY ERROR: Checksum enforcement is not working"
            echo "   bootstrap-tools.sh should fail when ENFORCE_CHECKSUMS=1 and checksums are missing"
            exit 1
          fi

          echo "✓ Checksum enforcement validation passed"
