name: ScopeGuard
on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: cachix/install-nix-action@v31
      # TODO: Implement PR scope enforcement (see specs/spec_ledger.yaml for scope definitions)
      - run: echo "PR scope guard check - implement as needed for your project"
