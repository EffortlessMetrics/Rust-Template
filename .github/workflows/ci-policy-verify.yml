name: PolicyVerify
on:
  pull_request:
    paths: ['policy/**', 'scripts/test-policy.sh', '.github/workflows/ci-policy-verify.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix develop -c bash scripts/test-policy.sh
