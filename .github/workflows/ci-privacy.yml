name: Privacy
on:
  pull_request:
    paths: ['specs/privacy.yaml', 'policy/privacy.rego', '.github/workflows/ci-privacy.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  privacy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop -c bash -c 'yq -o=json specs/privacy.yaml | conftest test -p policy/privacy.rego -'
