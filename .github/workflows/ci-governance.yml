
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Governance
on:
  pull_request:
    paths:
      - 'specs/**'
      - '.github/workflows/ci-governance.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  impacted:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: List impacted specs
        uses: actions/github-script@v7
        if: ${{ github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]' }}
        with:
          script: |
            const { execSync } = require('node:child_process');
            const out = execSync('git diff --name-only origin/main...').toString();
            const specs = out.split('\n').filter(f => f.startsWith('specs/')).filter(Boolean);
            if (!specs.length) { return; }
            const body = "### Impacted specs\n\n```text\n" + specs.join("\n") + "\n```\n";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: PR title hint
        uses: actions/github-script@v7
        if: ${{ github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]' }}
        with:
          script: |
            const labels = (context.payload.pull_request?.labels || []).map(l => l.name);
            const hasSkip = labels.includes('skip-title-check');
            if (hasSkip) {
              core.info('skip-title-check label found, skipping title check');
              return;
            }
            const t = context.payload.pull_request.title || "";
            if (!/((AC|US|FT)-\d+)/.test(t)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: "Hint: prefix PR titles with `AC-###`, `US-###`, or `FT-###` for traceability. Add label `skip-title-check` to suppress."
              });
            }
