env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Template Self-Test
# NOTE: This workflow validates cross-platform compilation (macOS + Windows).
# Linux + full BDD is handled by tier1-selftest.yml to avoid redundant BDD runs.
on:
  push:
    branches: [main, claude/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tier: "Tier 1 (macOS + Nix)"
          - os: windows-latest
            tier: "Tier 2 (Windows native)"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.tier }}
    timeout-minutes: 30
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
          cache-on-failure: true

      # Nix only on Linux/macOS (Tier 1 platforms)
      - uses: cachix/install-nix-action@v31
        if: runner.os != 'Windows'

      # Verify tool checksums early to catch security issues
      - name: Verify tool checksums
        if: runner.os != 'Windows'
        run: |
          nix develop -c cargo xtask tools-checksum-verify

      - name: Enable sccache (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if nix develop -c sh -c 'command -v sccache >/dev/null 2>&1'; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=1" >> $GITHUB_ENV
            echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
            nix develop -c sccache --start-server || true
          else
            echo "Warning: sccache not found in nix devshell, skipping"
          fi

      # Tier 1 (macOS): Governance checks only (no BDD - tier1-selftest owns Linux BDD)
      - name: Run governance checks (Tier 1 - macOS)
        if: runner.os == 'macOS'
        run: nix develop -c cargo run -p xtask -- check

      # Tier 2: Basic validation without Nix (Windows)
      # protoc is required for adapters-grpc
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build xtask (Tier 2 - Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build -p xtask

      - name: Run governance checks (Tier 2 - Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Use --release to avoid stack overflow on Windows (smaller default stack in debug builds)
        run: cargo run -p xtask --release -- check

      - name: Run workspace tests (Tier 2 - Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo test --workspace --exclude acceptance --exclude xtask

      # Note: BDD artifacts are generated by tier1-selftest.yml, not this workflow
      # This workflow only runs `check` which doesn't generate acceptance.xml

      - name: Show sccache stats
        if: always() && runner.os != 'Windows'
        run: nix develop -c sccache --show-stats || true
