name: Template Self-Test
on:
  push:
    branches: [main, claude/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: Swatinem/rust-cache@v2

      - uses: cachix/install-nix-action@v27

      - name: Enable sccache
        run: |
          echo "RUSTC_WRAPPER=$(nix develop -c which sccache)" >> $GITHUB_ENV
          echo "SCCACHE_GHA_ENABLED=1" >> $GITHUB_ENV
          echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
          nix develop -c sccache --start-server || true

      - name: Run xtask check
        run: nix develop -c cargo run -p xtask -- check

      - name: Run xtask bdd
        run: nix develop -c cargo run -p xtask -- bdd

      - name: Generate AC status
        run: nix develop -c python3 scripts/ac_status.py

      - name: Generate LLM bundle
        run: nix develop -c cargo run -p xtask -- bundle implement_ac

      - name: Verify feature_status.md was generated
        run: test -f docs/feature_status.md

      - name: Verify bundle was generated
        run: test -f .llm/bundle/implement_ac.md

      - name: Show sccache stats
        if: always()
        run: nix develop -c sccache --show-stats || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: template-selftest-artifacts
          path: |
            docs/feature_status.md
            .llm/bundle/implement_ac.md
            target/junit/acceptance.xml
