name: Template Self-Test
on:
  push:
    branches: [main, claude/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            tier: "Tier 1 (Linux + Nix)"
          - os: macos-latest
            tier: "Tier 1 (macOS + Nix)"
          - os: windows-latest
            tier: "Tier 2 (Windows native)"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.tier }}
    timeout-minutes: 30
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: Swatinem/rust-cache@v2

      # Nix only on Linux/macOS (Tier 1 platforms)
      - uses: cachix/install-nix-action@v31
        if: runner.os != 'Windows'

      - name: Enable sccache (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if nix develop -c sh -c 'command -v sccache >/dev/null 2>&1'; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=1" >> $GITHUB_ENV
            echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
            nix develop -c sccache --start-server || true
          else
            echo "Warning: sccache not found in nix devshell, skipping"
          fi

      # Tier 1: Full selftest in Nix devshell (Linux/macOS)
      - name: Run template self-test suite (Tier 1 - Nix)
        if: runner.os != 'Windows'
        run: nix develop -c cargo run -p xtask -- selftest

      # Tier 2: Basic validation without Nix (Windows)
      # protoc is required for adapters-grpc
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build xtask (Tier 2 - Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo build -p xtask

      - name: Run governance checks (Tier 2 - Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Use --release to avoid stack overflow on Windows (smaller default stack in debug builds)
        run: cargo run -p xtask --release -- check

      - name: Run workspace tests (Tier 2 - Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo test --workspace --exclude acceptance --exclude xtask

      # Verify artifacts (Linux/macOS only - advisory check)
      # Note: features-policy job provides authoritative AC governance enforcement
      - name: Verify artifacts were generated (advisory)
        if: runner.os != 'Windows'
        run: |
          missing=0
          for f in docs/feature_status.md .llm/bundle/implement_ac.md target/junit/acceptance.xml; do
            if [ ! -f "$f" ]; then
              echo "::warning::Missing expected artifact: $f"
              missing=$((missing + 1))
            else
              echo "✓ Found: $f"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing artifact(s) missing. Run 'cargo xtask selftest' locally to regenerate."
          fi
          # Don't fail - features-policy is the authoritative governance gate

      # Ensure clean git state (Linux/macOS only - docs-as-code enforcement)
      # Note: feature_status.md and release evidence may have non-deterministic diffs across
      # environments (timestamps, paths). We log them but only fail on other dirty files.
      - name: Ensure clean git state (docs-as-code enforcement)
        if: runner.os != 'Windows'
        run: |
          echo "Git status after selftest:"
          git status --porcelain || true
          echo ""

          # Filter out known non-deterministic artifacts
          CHANGES=$(git status --porcelain \
            | awk '{print $2}' \
            | grep -Ev '^docs/feature_status\.md$|^release_evidence/v0\.0\.0-test\.md$' \
            || true)

          if [[ -n "$CHANGES" ]]; then
            echo "❌ Git tree is dirty after running selftest. The following files were modified:"
            echo "$CHANGES"
            echo ""
            echo "💡 Please run 'cargo xtask selftest' locally and commit the changes."
            exit 1
          fi
          echo "✅ Git tree is clean (ignoring known non-deterministic evidence docs)."

      - name: Show sccache stats
        if: always() && runner.os != 'Windows'
        run: nix develop -c sccache --show-stats || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: template-selftest-artifacts-${{ matrix.os }}
          path: |
            docs/feature_status.md
            .llm/bundle/implement_ac.md
            target/junit/acceptance.xml
