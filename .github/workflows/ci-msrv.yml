name: MSRV
on:
  pull_request:
    paths: ['Cargo.toml','crates/**/Cargo.toml','.github/workflows/ci-msrv.yml']
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions: { contents: read }
    env:
      # Tool version sourced from .github/workflows/tool-versions.yml
      PROTOC_VERSION: "27.x"
    steps:
      - uses: actions/checkout@v4

      - name: Extract MSRV from workspace Cargo.toml
        id: msrv
        run: |
          v=$(grep -E '^\s*rust-version\s*=\s*"[0-9.]+"' -m1 Cargo.toml | sed -E 's/.*"([0-9.]+)".*/\1/')
          test -n "$v" || (echo "No rust-version found" && exit 1)
          echo "msrv=$v" >> $GITHUB_OUTPUT

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-${{ steps.msrv.outputs.msrv }}

      - name: Toolchain = ${{ steps.msrv.outputs.msrv }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}
          components: clippy,rustfmt

      # protoc is required for adapters-grpc
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "${{ env.PROTOC_VERSION }}"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with MSRV
        run: cargo +${{ steps.msrv.outputs.msrv }} build --workspace

      - name: Test with MSRV
        run: cargo +${{ steps.msrv.outputs.msrv }} test --workspace
