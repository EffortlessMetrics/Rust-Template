name: tier1-selftest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Determine if BDD is needed based on changed files
      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            bdd_needed:
              - "crates/**"
              - "specs/**"
              - "**/*.feature"
              - "Cargo.toml"
              - "Cargo.lock"
              - "flake.nix"
              - "flake.lock"
              - ".github/actions/**"
              - ".github/workflows/tier1-selftest.yml"
            docs_only:
              - "docs/**"
              - "**/*.md"
              - "CHANGELOG.md"
              - "LICENSE*"

      - name: Setup Rust + Nix environment
        uses: ./.github/actions/setup-rust-nix

      # Fast governance checks only (docs-only PRs skip BDD)
      - name: Run governance checks only (no BDD)
        if: steps.changes.outputs.bdd_needed != 'true'
        env:
          XTASK_STRICT_PRECOMMIT: "1"
        run: |
          echo "📚 Docs-only change detected - running fast governance checks"
          nix develop -c cargo xtask check

      # Full selftest with BDD (only when code/specs/features changed)
      # Consolidates all nix develop calls into a single devshell invocation
      - name: Run kernel selftest (Tier 1)
        if: steps.changes.outputs.bdd_needed == 'true'
        # Kernel AC coverage gate (ADR-0024):
        # - KERNEL_UNKNOWN_BUDGET: Max unknown kernel ACs allowed (ratchet down over time)
        # - XTASK_STRICT_AC_COVERAGE: On main, budget is enforced (unknowns > budget = fail)
        # - XTASK_STRICT_PRECOMMIT: Make docs-check a hard gate in CI
        #
        # Current baseline: 0 unknown kernel ACs (target: 0 achieved!)
        # Updated 2025-12-11: Achieved 100% kernel AC coverage (72/72 PASS)
        #
        # See: cargo xtask ac-coverage --todo --must-have for backlog
        env:
          KERNEL_UNKNOWN_BUDGET: "0"
          XTASK_STRICT_AC_COVERAGE: ${{ github.ref == 'refs/heads/main' && '1' || '' }}
          XTASK_STRICT_PRECOMMIT: "1"
        run: |
          nix develop -c bash -lc '
            set -euo pipefail

            # Run full selftest (includes BDD)
            cargo xtask selftest

            # Generate AC status snapshot
            mkdir -p artifacts/ac-status
            cargo xtask ac-status --json > artifacts/ac-status/ac-status-${GITHUB_SHA}.json

            # Run AC SLO gate on main branch
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              cargo xtask ac-slo \
                --dir artifacts/ac-status \
                --min-coverage 80.0 \
                --max-blockers 0
            fi
          '

      - name: Verify artifacts were generated
        if: steps.changes.outputs.bdd_needed == 'true'
        run: |
          test -f docs/feature_status.md || echo "Warning: feature_status.md not generated"
          test -f .llm/bundle/implement_ac.md || echo "Warning: LLM bundle not generated"
          test -f target/junit/acceptance.xml || echo "Warning: JUnit XML not generated"

      - name: Show sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats

      # Upload artifacts on failure (for debugging) or on main (for audit/trends)
      - name: Upload test artifacts
        if: (failure() || github.ref == 'refs/heads/main') && steps.changes.outputs.bdd_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tier1-selftest-artifacts
          path: |
            docs/feature_status.md
            .llm/bundle/implement_ac.md
            target/junit/acceptance.xml
          if-no-files-found: warn

      - name: Upload AC status snapshot
        if: (failure() || github.ref == 'refs/heads/main') && steps.changes.outputs.bdd_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          # Group by branch for easier time-series analysis
          name: ac-status-${{ github.ref_name }}
          path: artifacts/ac-status/
          retention-days: 30
