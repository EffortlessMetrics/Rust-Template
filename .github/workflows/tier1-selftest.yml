name: tier1-selftest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Determine if BDD is needed based on changed files
      # Three-tier model:
      #   1. docs_only=true AND non_docs!=true → docs-check only (fastest)
      #   2. bdd_needed!=true AND non_docs=true → cargo xtask check (fast)
      #   3. bdd_needed=true → full selftest with BDD (complete)
      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          list-files: shell
          filters: |
            bdd_needed:
              - "crates/**"
              - "specs/**"
              - "**/*.feature"
              - "Cargo.toml"
              - "Cargo.lock"
            docs_only:
              - "docs/**"
              - "**/*.md"
              - "CHANGELOG.md"
              - "LICENSE*"
            non_docs:
              - "**"
              - "!docs/**"
              - "!**/*.md"
              - "!CHANGELOG.md"
              - "!LICENSE*"

      - name: Print change classification
        if: always()
        shell: bash
        run: |
          echo "=== Event Context ==="
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "head_ref=${{ github.head_ref }}"
            echo "base_ref=${{ github.base_ref }}"
          fi

          echo ""
          echo "=== Filter Results ==="
          echo "bdd_needed=${{ steps.changes.outputs.bdd_needed }} (count=${{ steps.changes.outputs.bdd_needed_count }})"
          echo "docs_only=${{ steps.changes.outputs.docs_only }} (count=${{ steps.changes.outputs.docs_only_count }})"
          echo "non_docs=${{ steps.changes.outputs.non_docs }} (count=${{ steps.changes.outputs.non_docs_count }})"

          # Determine which tier will run
          tier="check"
          tier_reason="non-BDD changes (fast governance)"
          if [ "${{ steps.changes.outputs.bdd_needed }}" = "true" ]; then
            tier="selftest (BDD)"
            tier_reason="code/specs/features changed"
          elif [ "${{ steps.changes.outputs.docs_only }}" = "true" ] && [ "${{ steps.changes.outputs.non_docs }}" != "true" ]; then
            tier="docs-check"
            tier_reason="docs-only changes"
          fi

          echo ""
          echo "=== Tier Decision ==="
          echo "tier=$tier"
          echo "reason=$tier_reason"

          # Print file lists (truncated to avoid log noise)
          max_files=50
          print_files() {
            local label="$1"
            local files="$2"
            local count="$3"

            # Guard against empty/non-numeric count (prevents -gt exit code 2)
            count="${count:-0}"
            if ! [[ "$count" =~ ^[0-9]+$ ]]; then count=0; fi

            echo ""
            echo "=== $label files (showing first $max_files) ==="
            printf '%s\n' "$files" | head -n "$max_files"
            if (( count > max_files )); then
              echo "(... truncated; total=$count)"
            fi
          }

          if [ "${{ steps.changes.outputs.bdd_needed }}" = "true" ]; then
            print_files "bdd_needed" "${{ steps.changes.outputs.bdd_needed_files }}" "${{ steps.changes.outputs.bdd_needed_count }}"
          fi

          if [ "${{ steps.changes.outputs.docs_only }}" = "true" ]; then
            print_files "docs_only" "${{ steps.changes.outputs.docs_only_files }}" "${{ steps.changes.outputs.docs_only_count }}"
          fi

          if [ "${{ steps.changes.outputs.non_docs }}" = "true" ]; then
            print_files "non_docs" "${{ steps.changes.outputs.non_docs_files }}" "${{ steps.changes.outputs.non_docs_count }}"
          fi

          # Write step summary
          {
            echo "### tier1-selftest classification"
            echo ""
            echo "| Filter | Matched | Count |"
            echo "|--------|---------|-------|"
            echo "| bdd_needed | \`${{ steps.changes.outputs.bdd_needed }}\` | ${{ steps.changes.outputs.bdd_needed_count }} |"
            echo "| docs_only | \`${{ steps.changes.outputs.docs_only }}\` | ${{ steps.changes.outputs.docs_only_count }} |"
            echo "| non_docs | \`${{ steps.changes.outputs.non_docs }}\` | ${{ steps.changes.outputs.non_docs_count }} |"
            echo ""
            echo "**Tier:** \`$tier\` ($tier_reason)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Rust + Nix environment
        uses: ./.github/actions/setup-rust-nix

      # Docs-only checks (fastest path)
      # Only runs when ALL changes are docs (no non-docs files changed)
      - name: Run docs governance only (docs-only)
        if: >
          steps.changes.outputs.docs_only == 'true' &&
          steps.changes.outputs.non_docs != 'true' &&
          steps.changes.outputs.bdd_needed != 'true'
        env:
          XTASK_STRICT_PRECOMMIT: "1"
        run: |
          echo "Docs-only change - running docs-check"
          nix develop -c cargo xtask docs-check

      # Fast governance checks (non-BDD changes that aren't docs-only)
      - name: Run governance checks only (no BDD)
        if: >
          steps.changes.outputs.bdd_needed != 'true' &&
          steps.changes.outputs.non_docs == 'true'
        env:
          XTASK_STRICT_PRECOMMIT: "1"
        run: |
          echo "Non-BDD change - running fast governance checks"
          nix develop -c cargo xtask check

      # Full selftest with BDD (only when code/specs/features changed)
      # Consolidates all nix develop calls into a single devshell invocation
      - name: Run kernel selftest (Tier 1)
        if: steps.changes.outputs.bdd_needed == 'true'
        # Kernel AC coverage gate (ADR-0024):
        # - KERNEL_UNKNOWN_BUDGET: Max unknown kernel ACs allowed (ratchet down over time)
        # - XTASK_STRICT_AC_COVERAGE: On main, budget is enforced (unknowns > budget = fail)
        # - XTASK_STRICT_PRECOMMIT: Make docs-check a hard gate in CI
        #
        # Current baseline: 0 unknown kernel ACs (target: 0 achieved!)
        # Updated 2025-12-11: Achieved 100% kernel AC coverage (72/72 PASS)
        #
        # See: cargo xtask ac-coverage --todo --must-have for backlog
        env:
          KERNEL_UNKNOWN_BUDGET: "0"
          XTASK_STRICT_AC_COVERAGE: ${{ github.ref == 'refs/heads/main' && '1' || '' }}
          XTASK_STRICT_PRECOMMIT: "1"
        run: |
          nix develop -c bash -lc '
            set -euo pipefail

            # Run full selftest (includes BDD)
            cargo xtask selftest

            # Generate AC status snapshot
            mkdir -p artifacts/ac-status
            cargo xtask ac-status --json > artifacts/ac-status/ac-status-${GITHUB_SHA}.json

            # Run AC SLO gate on main branch
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              cargo xtask ac-slo \
                --dir artifacts/ac-status \
                --min-coverage 80.0 \
                --max-blockers 0
            fi
          '

      - name: Verify artifacts were generated
        if: steps.changes.outputs.bdd_needed == 'true'
        run: |
          test -f docs/feature_status.md || echo "Warning: feature_status.md not generated"
          test -f .llm/bundle/implement_ac.md || echo "Warning: LLM bundle not generated"
          test -f target/junit/acceptance.xml || echo "Warning: JUnit XML not generated"

      - name: Show sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats

      # Upload artifacts on failure (for debugging) or on main (for audit/trends)
      - name: Upload test artifacts
        if: (failure() || github.ref == 'refs/heads/main') && steps.changes.outputs.bdd_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tier1-selftest-artifacts
          path: |
            docs/feature_status.md
            .llm/bundle/implement_ac.md
            target/junit/acceptance.xml
          if-no-files-found: warn

      - name: Upload AC status snapshot
        if: (failure() || github.ref == 'refs/heads/main') && steps.changes.outputs.bdd_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          # Group by branch for easier time-series analysis
          name: ac-status-${{ github.ref_name }}
          path: artifacts/ac-status/
          retention-days: 30
