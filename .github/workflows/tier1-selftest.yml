name: tier1-selftest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust + Nix environment
        uses: ./.github/actions/setup-rust-nix

      - name: Run kernel selftest (Tier 1)
        # Strict AC coverage: fail on Unknown must_have_ac ACs (main branch only)
        env:
          XTASK_STRICT_AC_COVERAGE: ${{ github.ref == 'refs/heads/main' && '1' || '' }}
        run: nix develop -c cargo xtask selftest

      - name: Verify artifacts were generated
        run: |
          test -f docs/feature_status.md || echo "Warning: feature_status.md not generated"
          test -f .llm/bundle/implement_ac.md || echo "Warning: LLM bundle not generated"
          test -f target/junit/acceptance.xml || echo "Warning: JUnit XML not generated"

      - name: Generate AC status snapshot (JSON)
        run: |
          mkdir -p artifacts/ac-status
          # ac-status uses schema_version=2.0; this is the contract consumers depend on
          nix develop -c cargo xtask ac-status --json > artifacts/ac-status/ac-status-${GITHUB_SHA}.json

      - name: Show sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-selftest-artifacts
          path: |
            docs/feature_status.md
            .llm/bundle/implement_ac.md
            target/junit/acceptance.xml
          if-no-files-found: warn

      - name: Upload AC status snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Group by branch for easier time-series analysis
          name: ac-status-${{ github.ref_name }}
          path: artifacts/ac-status/
          retention-days: 30

      # -------------------------------------------------------------------------
      # AC SLO Gate
      # Enforces AC coverage Service Level Objectives on main branch.
      # - Kernel failures (--max-blockers 0): No failing must_have_ac ACs
      # - Kernel unknowns: Enforced via XTASK_STRICT_AC_COVERAGE in selftest
      # - Overall coverage (--min-coverage 80.0): Advisory baseline
      # Note: Optional/non-kernel unknowns are informational and don't block.
      # -------------------------------------------------------------------------
      - name: Check AC governance SLO (kernel)
        if: github.ref == 'refs/heads/main'
        run: |
          nix develop -c cargo xtask ac-slo \
            --dir artifacts/ac-status \
            --min-coverage 80.0 \
            --max-blockers 0
