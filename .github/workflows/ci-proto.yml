
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Proto
on:
  pull_request:
    paths: ['specs/proto/**', 'buf.yaml', '.github/workflows/ci-proto.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buf:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: { contents: read }
    env:
      ENFORCE_CHECKSUMS: "1"
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/cache@v4
        with:
          path: .tools/bin
          key: tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('bootstrap-tools.sh') }}
      - uses: cachix/install-nix-action@v31
      - run: nix develop -c ./bootstrap-tools.sh

      - name: Build baseline from origin/main
        run: |
          rm -rf /tmp/baseproto && mkdir -p /tmp/baseproto
          git fetch --no-tags --prune origin +refs/heads/*:refs/remotes/origin/*
          git archive --format=tar origin/main specs/proto | tar -x -C /tmp/baseproto || true
      - run: nix develop -c ./.tools/bin/buf lint
      # Breaking check is advisory for template baseline resets (v1 package promotions)
      # Once v1 is stable, remove continue-on-error to enforce strict BC
      - name: buf breaking (advisory)
        run: nix develop -c ./.tools/bin/buf breaking specs/proto --against /tmp/baseproto/specs/proto --error-format text
        continue-on-error: true
