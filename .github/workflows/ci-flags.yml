env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Flags
on:
  pull_request:
    paths: ['flags/**', '.github/workflows/ci-flags.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flags-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Flags & rollouts Policy
        run: |
          nix develop -c bash -c '
            yq -o=json flags/registry.yaml > /tmp/flags.json
            yq -o=json flags/rollouts.yaml | jq "{rollouts: .environments}" > /tmp/rollouts.json
            jq -s ".[0] * .[1]" /tmp/flags.json /tmp/rollouts.json               | conftest test -p policy/flags.rego -
          '
