name: ACs
on:
  pull_request:
    paths:
      - 'specs/features/**'
      - 'specs/spec_ledger.yaml'
      - 'crates/**'
      - 'crates/acceptance/**'
      - '.github/workflows/ci-ac.yml'

# Permissions for JUnit publisher action (publish-unit-test-result-action)
permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bdd:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: cachix/install-nix-action@v31
      - name: Run BDD tests via xtask
        run: nix develop -c cargo run -p xtask -- bdd

      - name: Generate AC status (Rust)
        if: always()
        run: nix develop -c cargo run -p xtask -- ac-status

      - name: Publish BDD JUnit results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: target/junit/**/*.xml
      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: feature-status, path: docs/feature_status.md }
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: AC Coverage Policy
        run: |
          nix develop -c bash -c 'yq -o=json specs/spec_ledger.yaml | conftest test -p policy/ledger.rego -'
