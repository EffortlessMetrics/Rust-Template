
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

name: Maintenance – Pin Actions
on:
  schedule: [{ cron: '0 8 1 * *' }]
  workflow_dispatch: {}
permissions: { contents: write, pull-requests: write }

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cli/gh-cli@v2
      - name: Pin actions and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo run -p xtask -- pin-actions
