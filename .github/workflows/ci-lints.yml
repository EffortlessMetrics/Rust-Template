name: Lints
on:
  pull_request:
    paths-ignore: ['**/*.md','docs/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-lints:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: cachix/install-nix-action@v27
      - name: Enable sccache
        run: |
          if nix develop -c sh -c 'command -v sccache >/dev/null 2>&1'; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=1" >> $GITHUB_ENV
            echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
            nix develop -c sccache --start-server || true
          else
            echo "Warning: sccache not found in nix devshell, skipping"
          fi
      - name: Run checks via xtask
        run: nix develop -c cargo run -p xtask -- check
      - name: Show sccache stats
        if: always()
        run: nix develop -c sccache --show-stats || true
