# NOTE: This workflow is a convenience selftest runner.
# The authoritative kernel gate is .github/workflows/tier1-selftest.yml
# which enforces:
#   - XTASK_STRICT_AC_COVERAGE=1 (on main branch)
#   - XTASK_STRICT_PRECOMMIT=1
# This workflow does NOT set those environment variables, so it is NOT the kernel gate.

name: Self-Test
# NOTE: This workflow is now manual/scheduled only to avoid redundant BDD runs.
# The authoritative kernel gate is tier1-selftest.yml (runs on every push/PR).
# Use this workflow for ad-hoc full selftest runs or nightly coverage validation.
on:
  workflow_dispatch: {}
  schedule:
    # Nightly at 6 AM UTC
    - cron: "0 6 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions: { contents: read }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
          cache-on-failure: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable sccache
        run: |
          if nix develop -c sh -c 'command -v sccache >/dev/null 2>&1'; then
            echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
            echo "SCCACHE_GHA_ENABLED=1" >> $GITHUB_ENV
            echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV
            nix develop -c sccache --start-server || true
          else
            echo "Warning: sccache not found in nix devshell, skipping"
          fi

      - name: Run template self-test suite
        run: nix develop -c cargo run -p xtask -- selftest

      - name: Verify artifacts were generated
        run: |
          test -f docs/feature_status.md || echo "Warning: feature_status.md not generated"
          test -f .llm/bundle/implement_ac.md || echo "Warning: LLM bundle not generated"
          test -f target/junit/acceptance.xml || echo "Warning: JUnit XML not generated"

      - name: Show sccache stats
        if: always()
        run: nix develop -c sccache --show-stats || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selftest-artifacts
          path: |
            docs/feature_status.md
            .llm/bundle/implement_ac.md
            target/junit/acceptance.xml
          if-no-files-found: warn
