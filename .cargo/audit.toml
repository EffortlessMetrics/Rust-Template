# Cargo-audit configuration
# See: https://rustsec.org/

[advisories]
# See deny.toml and ADR-0007 for dependency security policy.
ignore = [
  # RUSTSEC-2023-0071: rsa Marvin Attack - transitive from sqlx-mysql, no fix available
  # Timing side-channel; acceptable for this template. See ADR-0007.
  "RUSTSEC-2023-0071",
  # RUSTSEC-2025-0057: fxhash unmaintained - dev-only via selectors/scraper
  # Waiting for upstream selectors fix
  "RUSTSEC-2025-0057",
  # RUSTSEC-2025-0134: rustls-pemfile unmaintained - dev-only via bollard/testcontainers
  # Waiting for upstream bollard fix
  "RUSTSEC-2025-0134"
]
# Warn about unmaintained crates but don't fail
informational_warnings = ["unmaintained"]
