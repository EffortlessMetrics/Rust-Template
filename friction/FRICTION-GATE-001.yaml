# Friction Entry: Non-deterministic feature_status.md generation in selftest
# Created at 2026-01-10
# Status: open

id: FRICTION-GATE-001
date: 2026-01-10
category: tooling
severity: medium
summary: Non-deterministic feature_status.md generation depends on AC coverage state
description: |
  The `docs/feature_status.md` file is regenerated by selftest/precommit from
  `target/ac/coverage.jsonl`. Because coverage data accumulates across runs
  rather than being scoped to a single selftest invocation, the generated
  markdown can differ based on what tests previously ran.

  This causes spurious diffs where feature_status.md changes between runs
  even when no actual AC coverage has changed.

  Observed in PR #104 where repeated commits were needed to stabilize the file.
expected_behavior: |
  `cargo xtask selftest` should produce stable `docs/feature_status.md` given
  a stable set of tests it runs. Either:
  - selftest should clear/overwrite coverage inputs at the start of the run, or
  - feature_status generation should use a deterministic "this run" artifact
    rather than a cumulative log
workaround: |
  Before running selftest, clear the cumulative coverage file:
  ```bash
  rm -f target/ac/coverage.jsonl
  cargo xtask selftest
  ```
  Then commit the canonical output.
impact: |
  - Spurious diffs in PRs when coverage.jsonl has stale or extra entries
  - Manual stabilization steps required before merge
  - Violates the "truth surface should be deterministic" principle
context:
  discovered_by: agent
  phase: development
  files_involved:
    - target/ac/coverage.jsonl
    - docs/feature_status.md
    - crates/xtask/src/commands/ac_status.rs
  commands_involved:
    - cargo xtask selftest
    - cargo xtask ac-status
status: open
related_items:
  issues:
    - '#104'
