apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-http
spec:
  replicas: 2  # Staging runs with 2 replicas for light load testing
  template:
    spec:
      containers:
        - name: app-http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Staging probes match production for realistic testing
          # This ensures staging can catch probe-related issues before prod
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          # Load non-sensitive configuration from ConfigMap
          envFrom:
            - configMapRef:
                name: app-config
            # Load sensitive configuration from Secret
            - secretRef:
                name: app-secrets
