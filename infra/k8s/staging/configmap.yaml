apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  labels:
    app: app-http
    environment: staging
data:
  # Non-sensitive application configuration
  ENVIRONMENT: "staging"
  RUST_LOG: "info,app_http=info"
  LOG_LEVEL: "info"
  PORT: "8080"
  # Feature flags
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  # Staging-specific settings
  RATE_LIMIT_ENABLED: "true"
  CACHE_TTL: "300"
