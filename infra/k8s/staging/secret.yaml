apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
  labels:
    app: app-http
    environment: staging
type: Opaque
stringData:
  # Sensitive configuration - values should be injected from secret management system
  # These are placeholders for demonstration
  DATABASE_URL: "postgresql://user:password@staging-db.internal:5432/dbname"
  API_KEY: "staging-api-key-from-vault"
  JWT_SECRET: "staging-jwt-secret-from-vault"
  REDIS_PASSWORD: "staging-redis-password"
  # External service credentials
  AWS_ACCESS_KEY_ID: "AKIASTAGINGKEY"
  AWS_SECRET_ACCESS_KEY: "staging-secret-key-from-vault"
  # Third-party API tokens
  STRIPE_API_TOKEN: "sk_test_staging_token"
  SENDGRID_API_KEY: "SG.staging-key"
