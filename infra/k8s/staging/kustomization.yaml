apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging environment overlay
# Inherits base dev configuration and applies staging-specific patches

namespace: my-service-staging

# Use dev as the base
resources:
  - ../dev

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/environment: staging
  app.kubernetes.io/managed-by: kustomize

# Patches for staging-specific configuration
patchesStrategicMerge:
  - deployment-patch.yaml

# ConfigMap generator for environment-specific config
configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=info
      - RUST_LOG=info

# Image tag override (typically set via CI/CD)
images:
  - name: my-service
    newTag: staging-latest
