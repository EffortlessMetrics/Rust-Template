apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging environment overlay
# Inherits base dev configuration and applies staging-specific patches

namespace: app-http-staging

# Use dev as the base
resources:
- ../dev

# Common labels applied to all resources

# Patches for staging-specific configuration
patches:
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: app-http
- path: service-patch.yaml
  target:
    kind: Service
    name: app-http

# ConfigMap generator for environment-specific config
configMapGenerator:
- literals:
  - ENVIRONMENT=staging
  - LOG_LEVEL=info
  - RUST_LOG=info
  name: app-config

# Image tag override (typically set via CI/CD)
images:
- name: app-http
  newTag: staging-latest
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/environment: staging
    app.kubernetes.io/managed-by: kustomize
