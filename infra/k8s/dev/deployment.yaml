apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-http
  namespace: default
  labels:
    app: app-http
    version: v1
    component: api
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-http
      version: v1
  template:
    metadata:
      labels:
        app: app-http
        version: v1
        component: api
        environment: dev
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app-http
        image: app-http:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        # Load non-sensitive configuration from ConfigMap
        envFrom:
        - configMapRef:
            name: app-config
        # Load sensitive configuration from Secret
        - secretRef:
            name: app-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
