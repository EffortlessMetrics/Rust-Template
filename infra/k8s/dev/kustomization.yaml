apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Development environment (base configuration)
# This serves as the base for staging and prod overlays
metadata:
  name: app-http-dev

namespace: app-http-dev

# Base resources
resources:
- deployment.yaml
- service.yaml

# Common labels applied to all resources
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/environment: dev
    app.kubernetes.io/managed-by: kustomize

# Secret generator - reads from secret.env (not committed to git)
# Copy secret.env.example to secret.env and fill in real values
secretGenerator:
- name: app-secrets
  envs:
  - secret.env
  options:
    labels:
      app: app-http
      environment: dev
