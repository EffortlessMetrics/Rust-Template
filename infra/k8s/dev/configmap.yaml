apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  labels:
    app: app-http
    environment: dev
data:
  # Non-sensitive application configuration
  ENVIRONMENT: "dev"
  RUST_LOG: "info,app_http=debug"
  LOG_LEVEL: "debug"
  PORT: "8080"
  # Feature flags
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
