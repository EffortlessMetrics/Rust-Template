apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: default
  labels:
    app: app-http
    environment: production
    team: platform
    cost-center: engineering
data:
  # Non-sensitive application configuration
  ENVIRONMENT: "production"
  RUST_LOG: "info,app_http=info"
  LOG_LEVEL: "info"
  PORT: "8080"
  # Feature flags
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  # Production-specific settings
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "1000"
  CACHE_TTL: "600"
  # Performance tuning
  MAX_CONNECTIONS: "1000"
  POOL_SIZE: "20"
