apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: default
  labels:
    app: app-http
    environment: production
    team: platform
    cost-center: engineering
type: Opaque
stringData:
  # CRITICAL: Production secrets MUST be injected via CI/CD or secret management system
  # NEVER commit actual production secrets to version control
  # These are structural examples only - replace with your secret injection mechanism

  # Database credentials
  DATABASE_URL: "postgresql://user:password@prod-db.internal:5432/dbname"
  DATABASE_REPLICA_URL: "postgresql://user:password@prod-db-replica.internal:5432/dbname"

  # Application secrets
  API_KEY: "prod-api-key-from-vault"
  JWT_SECRET: "prod-jwt-secret-from-vault"
  ENCRYPTION_KEY: "prod-encryption-key-from-vault"

  # Cache and session store
  REDIS_PASSWORD: "prod-redis-password"
  REDIS_TLS_CERT: "prod-redis-tls-cert"

  # Cloud provider credentials
  AWS_ACCESS_KEY_ID: "AKIAPRODKEY"
  AWS_SECRET_ACCESS_KEY: "prod-secret-key-from-vault"

  # Third-party service tokens
  STRIPE_API_TOKEN: "sk_live_prod_token"
  SENDGRID_API_KEY: "SG.prod-key"
  DATADOG_API_KEY: "prod-datadog-key"

  # OAuth/OIDC
  OAUTH_CLIENT_SECRET: "prod-oauth-secret"
  OIDC_CLIENT_SECRET: "prod-oidc-secret"
