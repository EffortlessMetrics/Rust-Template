apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production environment overlay
# Inherits base dev configuration and applies production-hardened patches

namespace: app-http-prod

# Use dev as the base
resources:
- ../dev
- poddisruptionbudget.yaml

# Common labels applied to all resources
  # Production-specific labels for cost tracking, ownership, etc.

# Patches for production-specific configuration
patches:
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: app-http
- path: service-patch.yaml
  target:
    kind: Service
    name: app-http

# ConfigMap generator for environment-specific config
configMapGenerator:
- literals:
  - ENVIRONMENT=production
  - LOG_LEVEL=warn
  - RUST_LOG=warn,my_service=info
  name: app-config

# Image tag override (typically set via CI/CD)
images:
- name: app-http
  newTag: prod-latest
labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/environment: production
    app.kubernetes.io/managed-by: kustomize
    cost-center: engineering
    team: platform

# Secret generator - reads from secret.env (not committed to git)
# Copy secret.env.example to secret.env and fill in real values
# CRITICAL: Production secrets MUST be injected via CI/CD or secret management system
secretGenerator:
- name: app-secrets
  envs:
  - secret.env
  options:
    labels:
      app: app-http
      environment: production
      team: platform
      cost-center: engineering
